<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Simultaneo</title>
  <link rel="icon" type="image/png" href="./favicon.png?v=20260722-1">
  <link rel="apple-touch-icon" href="./favicon.png?v=20260722-1">
  <meta name="theme-color" content="#ffb800">
</head>
<body>
  <script type="module">
    import { supabase } from './supabase.js';

    const {
      data: { session }
    } = await supabase.auth.getSession();

    if (session?.user) {
      window.location.replace('./dashboard.html');
    } else {
      window.location.replace('./login.html');
    }
  </script>
  <p>Redirecionando para o CRM...</p>
</body>
</html>
