<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Simultaneo</title>
</head>
<body>
  <script type="module">
    import { supabase } from './crm/js/supabase.js';

    const {
      data: { session }
    } = await supabase.auth.getSession();

    if (session?.user) {
      window.location.replace('./crm/dashboard.html');
    } else {
      window.location.replace('./crm/login.html');
    }
  </script>
  <p>Redirecionando para o CRM...</p>
</body>
</html>
