    <main class="page-content">

  <script type="module">
  import { supabase, db } from './supabase.js';

  function formatarMoeda(valor) {
    if (valor == null || valor === '') return '—';
    return Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function escaparHtml(valor) {
    return String(valor ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function renderPropostasDoProjeto(propostas) {
    if (!propostas || propostas.length === 0) {
      return '<div class="empty-state" style="padding:10px;">Este projeto ainda não possui propostas cadastradas.</div>';
    }

    const linhas = propostas.map((p) => `
      <tr>
        <td>${escaparHtml(p.proposal_number || '—')}</td>
        <td>${escaparHtml(p.proposal_status || '—')}</td>
        <td>${formatarMoeda(p.value_brl)}</td>
        <td>
          <a class="btn-secondary" href="visualizar.html?type=proposal&id=${p.id}">Visualizar</a>
          <a class="btn" href="index.html?proposalId=${p.id}">Editar</a>
        </td>
      </tr>
    `).join('');

    return `
      <div style="overflow-x:auto;">
        <table style="margin:0; width:100%; min-width:680px;">
          <thead>
            <tr>
              <th>Número da proposta</th>
              <th>Status</th>
              <th>Valor</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>${linhas}</tbody>
        </table>
      </div>
    `;
  }

  async function renderProjects() {
    try {
      const { data: projetos, error } = await supabase
        .from('projects')
        .select(`
          id,
          client_id,
          responsible_id,
          name,
          services,
          status,
          created_at,

          cliente:clients!projects_client_id_fkey (
            id,
            name,
            legal_name
          ),

          responsavel:responsaveis!projects_responsible_id_fkey (
            id,
            nome_completo
          ),

          propostas:proposals!proposals_project_id_fkey (
            id,
            proposal_number,
            proposal_status,
            value_brl
          )
        `)
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Erro completo ao carregar projetos:', error);
        alert('Não foi possível carregar os projetos.');
        return;
      }

      const tbody = document.getElementById('projectTableBody');
      tbody.innerHTML = '';
      if (!projetos || projetos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">Nenhum projeto encontrado.</div></td></tr>';
        return;
      }

      for (const projeto of projetos) {
        const nomeCliente = projeto.cliente?.name || 'Não informado';
        const nomeResponsavel = projeto.responsavel?.nome_completo || 'Não informado';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${projeto.name || ''}</td>
          <td>${nomeCliente}</td>
          <td>${nomeResponsavel}</td>
          <td>${projeto.services || ''}</td>
          <td>${renderPropostasDoProjeto(projeto.propostas)}</td>
          <td>${projeto.status || ''}</td>
          <td>
            <div style="display:flex;gap:8px;">
              <a class="btn-secondary" href="visualizar.html?type=project&id=${projeto.id}">Visualizar</a>
              <a class="btn" href="projeto-novo.html?id=${projeto.id}">Editar</a>
              <button class="btn-secondary" type="button" data-id="${projeto.id}">Excluir</button>
            </div>
          </td>
        `;
        const deleteButton = tr.querySelector('button');
        deleteButton.onclick = async () => {
          if (!confirm('Excluir projeto?')) return;
          try {
            await db.deleteProject(projeto.id);
            renderProjects();
          } catch (error) {
            console.error('[deleteProject] Erro:', error);
            alert(`Erro ao excluir projeto:\n${error.message || JSON.stringify(error)}`);
          }
        };
        tbody.appendChild(tr);
      }
    } catch (error) {
      console.error('Erro completo ao carregar projetos:', error);
      alert('Não foi possível carregar os projetos.');
    }
  }

  renderProjects();
  </script>
