<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada</title>
<script>
  (function () {
    const appPages = {
      'dashboard.html': 'crm/dashboard.html',
      'funil.html': 'crm/funil.html',
      'clientes.html': 'crm/clientes.html',
      'cliente-novo.html': 'crm/cliente-novo.html',
      'projetos.html': 'crm/projetos.html',
      'projeto-novo.html': 'crm/projeto-novo.html',
      'visualizar.html': 'crm/visualizar.html',
      'proposta.html': 'crm/proposta.html',
      'usuarios.html': 'crm/usuarios.html'
    };

    const path = window.location.pathname;
    const segments = path.split('/').filter(Boolean);
    const file = segments.length ? segments[segments.length - 1] : '';
    const repoBase = segments.length > 1 ? `/${segments[0]}/` : '/';
    
    // Se for uma app page removida da raiz, redireciona para crm/
    if (appPages[file]) {
      window.location.replace(`${repoBase}${appPages[file]}${window.location.search}${window.location.hash}`);
      return;
    }
    
    // Caso contrário, redireciona para login
    window.location.replace(`${repoBase}login.html${window.location.search}${window.location.hash}`);
  })();
</script>
</head>
<body>
  <p>Página não encontrada. Redirecionando...</p>
</body>
</html>
