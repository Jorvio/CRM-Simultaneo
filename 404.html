<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada</title>
<script>
  (function () {
    const path = window.location.pathname;
    const segments = path.split('/').filter(Boolean);
    const repoBase = segments.length > 1 ? `/${segments[0]}/` : '/';
    
    // Redireciona para login (página de entrada)
    window.location.replace(`${repoBase}login.html${window.location.search}${window.location.hash}`);
  })();
</script>
</head>
<body>
  <p>Página não encontrada. Redirecionando...</p>
</body>
</html>
