<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada</title>
<script>
  (function () {
    const routeMap = {
      'dashboard.html': 'dashboard.html',
      'funil.html': 'funil.html',
      'clientes.html': 'clientes.html',
      'cliente-novo.html': 'cliente-novo.html',
      'projetos.html': 'projetos.html',
      'projeto-novo.html': 'projeto-novo.html',
      'visualizar.html': 'visualizar.html',
      'minha-conta.html': 'minha-conta.html',
      'usuarios.html': 'usuarios.html',
      'redefinir-senha.html': 'redefinir-senha.html',
      'index.html': 'index.html',
      '': 'login.html'
    };

    const path = window.location.pathname;
    const segments = path.split('/').filter(Boolean);
    const file = segments.length ? segments[segments.length - 1] : '';
    const repoBase = segments.length > 1 ? `/${segments[0]}/` : '/';
    const target = routeMap[file] || 'login.html';

    window.location.replace(`${repoBase}crm/${target}${window.location.search}${window.location.hash}`);
  })();
</script>
</head>
<body>
  <p>Página não encontrada. Redirecionando...</p>
</body>
</html>
