<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard CRM</title>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="dash.css">

<style>
/* ── Month/Year Controls ─────────────────────────── */
.dash-controls{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:22px;display:flex;align-items:center;gap:10px;}
.meses-barra{display:flex;flex:1;gap:3px;overflow-x:auto;scrollbar-width:none;}
.meses-barra::-webkit-scrollbar{display:none;}
.mes-filtro{flex-shrink:0;background:transparent;border:1px solid transparent;border-radius:6px;padding:6px 10px;font-size:11.5px;font-weight:500;color:var(--text-soft,#6B7280);cursor:pointer;font-family:Space Grotesk,sans-serif;letter-spacing:.02em;transition:background .15s,color .15s;white-space:nowrap;}
.mes-filtro:hover{background:var(--surface-alt,#F3F4F6);}
.mes-filtro.ativo{background:var(--sidebar-active,#EFF6FF);border-color:var(--border,#E5E7EB);color:var(--text,#111827);font-weight:700;}
.ano-wrap{position:relative;flex-shrink:0;}
.btn-ano{display:flex;align-items:center;gap:6px;background:var(--surface-alt,#F3F4F6);border:1px solid var(--border,#E5E7EB);border-radius:7px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--text,#111827);cursor:pointer;font-family:Space Grotesk,sans-serif;white-space:nowrap;}
.btn-ano svg{width:14px;height:14px;stroke:#2563EB;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.btn-ano:hover{border-color:#2563EB;}
.anos-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface,#fff);border:1px solid var(--border,#E5E7EB);border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;max-height:260px;overflow-y:auto;min-width:100px;}
.anos-dropdown.hidden{display:none;}
.anos-dropdown button{display:block;width:100%;background:transparent;border:none;padding:8px 16px;text-align:left;font-size:13px;color:var(--text-soft,#6B7280);cursor:pointer;font-family:JetBrains Mono,monospace;}
.anos-dropdown button:hover{background:var(--surface-alt,#F3F4F6);color:var(--text,#111827);}
.anos-dropdown button.ativo-ano{color:#2563EB;font-weight:700;}
</style>
</head>
<body>
  <div class="dashboard-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">CRM</div>
        <div class="brand-text">
          <span>CRM</span>
          <small>Simultâneo</small>

      <nav class="sidebar-nav">
        <a class="nav-item active" href="dashboard.html">

        <a class="nav-item" href="index.html">

        <a class="nav-item" href="clientes.html">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><path d="M20 8v6"></path><path d="M23 11h-6"></path></svg></span>
          <span class="nav-label">Clientes</span>

        <a class="nav-item" href="projetos.html">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18"></path><path d="M5 7v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7"></path><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></span>

          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.2a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.2a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9c0 .7.4 1.3 1 1.5V11a2 2 0 0 1 0 4h-.2a1.7 1.7 0 0 0-1.5 1Z"></path></svg></span>
          <span class="nav-label">Configurações</span>

      </nav>

      <div class="sidebar-footer">
        <div class="profile-avatar">J</div>
        <div class="profile-info">
          <span class="profile-name">João</span>
          <span class="profile-role">Gestor</span>
        </div>
      </div>
    </aside>

    <main class="dashboard-main">
      <!-- Controles: sempre visíveis -->
      <div class="dash-controls">
        <div class="meses-barra" id="mesesBarra">
          <button class="mes-filtro" data-mes="0">Janeiro</button>
          <button class="mes-filtro" data-mes="1">Fevereiro</button>
          <button class="mes-filtro" data-mes="2">Março</button>
          <button class="mes-filtro" data-mes="3">Abril</button>
          <button class="mes-filtro" data-mes="4">Maio</button>
          <button class="mes-filtro" data-mes="5">Junho</button>
          <button class="mes-filtro" data-mes="6">Julho</button>
          <button class="mes-filtro" data-mes="7">Agosto</button>
          <button class="mes-filtro" data-mes="8">Setembro</button>
          <button class="mes-filtro" data-mes="9">Outubro</button>
          <button class="mes-filtro" data-mes="10">Novembro</button>
          <button class="mes-filtro" data-mes="11">Dezembro</button>
        </div>
        <div class="ano-wrap">
          <button class="btn-ano" id="btnAno">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span id="anoExibido">2026</span>
          </button>
          <div class="anos-dropdown hidden" id="anosDropdown"></div>
        </div>
      </div>

      <!-- Conteúdo dinâmico -->
      <div id="dash-root">
        <div style="padding:48px;text-align:center;color:var(--text-soft,#6B7280);">
          <div style="font-size:16px;margin-bottom:6px;">Carregando dashboard...</div>
          <div style="font-size:12px;opacity:.7;">Buscando dados no Supabase</div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module">
  import './supabase.js'; // define window.supabaseClient

  // ── Constantes visuais ───────────────────────────────────────────────────
  const MESES_FULL = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const MESES_ABREV = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

  const C = {
    panel:'#FFFFFF', panelHi:'#F9FAFB',
    line:'#E5E7EB', lineSoft:'#F3F4F6',
    text:'#111827', muted:'#6B7280', mutedDim:'#9CA3AF',
    amber:'#F59E0B', cyan:'#10B981', violet:'#7C3AED', red:'#EF4444',
  };

  const ICONS = {
    trending:    '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
    trendDown:   '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>',
    clock:       '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
    check:       '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    x:           '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    layers:      '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>',
    dollar:      '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
    box:         '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>',
    building:    '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/></svg>',
    alert:       '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  };

  // ── Estado global ────────────────────────────────────────────────────────
  let mesSelecionado  = new Date().getMonth();
  let anoSelecionado  = new Date().getFullYear();
  let dadosMensais    = criarDadosMensaisZerados();
  let dadosGlobais    = { totalClientes: 0, totalProjetos: 0, totalContratos: 0 };
  let todasPropostas  = [];
  const clientNameById = new Map();
  const projectNameById = new Map();
  let barChart = null, lineChart = null, donutChart = null;
  let chartRenderVersion = 0;
  const root = document.getElementById('dash-root');

  // ── Helpers ──────────────────────────────────────────────────────────────

  function criarDadosMensaisZerados() {
    return MESES_FULL.map((nome, i) => ({
      mes: i, nome,
      propostas: 0, propostasAbertas: 0, propostasNegociando: 0,
      propostasAprovadas: 0, propostasPerdidas: 0, propostasPausadas: 0,
      valorPropostas: 0, valorAprovado: 0,
      topClientes: []
    }));
  }

  function extrairPartesDaData(data) {
    if (!data) return null;
    const s = String(data).split('T')[0];
    const p = s.split('-');
    if (p.length !== 3) return null;
    const ano = Number(p[0]);
    const mes = Number(p[1]) - 1;
    const dia = Number(p[2]);
    if (isNaN(ano) || isNaN(mes) || isNaN(dia)) return null;
    return { ano, mes, dia };
  }

  function converterValor(valor) {
    if (valor === null || valor === undefined || valor === '') return 0;
    if (typeof valor === 'number') return valor;
    return Number(String(valor).replace(/\./g, '').replace(',', '.').replace(/[^\d.-]/g, '')) || 0;
  }

  function formatarMoeda(valor) {
    return Number(valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function fmtBRL(v) {
    v = Number(v) || 0;
    if (v >= 1000000) return 'R$ ' + (v/1000000).toLocaleString('pt-BR', { maximumFractionDigits: 1 }) + 'M';
    if (v >= 1000)    return 'R$ ' + (v/1000).toLocaleString('pt-BR', { maximumFractionDigits: 1 }) + 'k';
    return 'R$ ' + v.toLocaleString('pt-BR');
  }

  function fmtBRLFull(v) {
    return Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function definirTexto(id, valor) {
    const el = document.getElementById(id);
    if (!el) { console.warn('[Dashboard] Elemento não encontrado: #' + id); return; }
    el.textContent = valor;
  }

  function normalizarProposta(p) {
    const clientName = p.client?.legal_name || p.client?.name || clientNameById.get(Number(p.client_id)) || (p.client_id != null ? `Cliente #${p.client_id}` : '');
    const projectName = p.project?.name || projectNameById.get(Number(p.project_id)) || (p.project_id != null ? `Projeto #${p.project_id}` : '');

    return {
      id:             p.id,
      numero:         p.proposal_number || p.numero || '',
      cliente:        clientName,
      projeto:        projectName,
      contato:        p.contact_name    || p.contato || '',
      dataOrcamento:  p.budget_date     || p.dataOrcamento  || p.created_at || '',
      dataFechamento: p.closing_date    || p.dataFechamento || '',
      valorReais:     converterValor(p.value_brl != null ? p.value_brl : p.valorReais),
      valorExterior:  converterValor(p.value_usd != null ? p.value_usd : p.valorExterior),
      statusProposta: p.proposal_status || p.statusProposta || 'Aberta',
      statusProjeto:  p.project_status  || p.statusProjeto  || '—',
      obs:            p.notes           || p.obs || '',
      created_at:     p.created_at      || '',
    };
  }

  // ── Processamento de dados ───────────────────────────────────────────────

  function processarDadosDoDashboard() {
    console.log('[Dashboard] Processando dados para ano:', anoSelecionado);
    const meses = criarDadosMensaisZerados();

    todasPropostas.forEach(p => {
      // Propostas recebidas → agrupadas por data_orcamento
      const dtOrc = extrairPartesDaData(p.dataOrcamento);
      if (dtOrc && dtOrc.ano === anoSelecionado) {
        const m = meses[dtOrc.mes];
        m.propostas++;
        m.valorPropostas += p.valorReais;
        const st = p.statusProposta;
        if      (st === 'Aberta')     m.propostasAbertas++;
        else if (st === 'Negociando') m.propostasNegociando++;
        else if (st === 'Perdida')    m.propostasPerdidas++;
        else if (st === 'Pausada')    m.propostasPausadas++;
        if (p.cliente) {
          const ci = m.topClientes.findIndex(c => c.nome === p.cliente);
          if (ci >= 0) m.topClientes[ci].valor += p.valorReais;
          else m.topClientes.push({ nome: p.cliente, valor: p.valorReais });
        }
      }

      // Propostas aprovadas → agrupadas por data_fechamento
      if (p.statusProposta === 'Fechada') {
        const dtFech = extrairPartesDaData(p.dataFechamento || p.dataOrcamento);
        if (dtFech && dtFech.ano === anoSelecionado) {
          const m = meses[dtFech.mes];
          m.propostasAprovadas++;
          m.valorAprovado += p.valorReais;
        }
      }
    });

    meses.forEach(m => {
      m.topClientes.sort((a, b) => b.valor - a.valor);
      m.topClientes = m.topClientes.slice(0, 4);
    });

    dadosMensais = meses;
    console.log('[Dashboard] dadosMensais calculado:', dadosMensais);
    atualizarDashboardDoMes();
  }

  function atualizarDashboardDoMes() {
    console.log('[Dashboard] Atualizando mês', mesSelecionado, '/', anoSelecionado);
    render();
  }

  // ── Seleção de mês ────────────────────────────────────────────────────────

  function selecionarMes(indiceMes) {
    mesSelecionado = Number(indiceMes);
    document.querySelectorAll('.mes-filtro').forEach((btn, i) => {
      btn.classList.toggle('ativo', i === mesSelecionado);
    });
    atualizarDashboardDoMes();
  }

  // ── Seleção de ano ────────────────────────────────────────────────────────

  function selecionarAno(ano) {
    anoSelecionado = Number(ano);
    atualizarAnoExibido();
    processarDadosDoDashboard();
  }

  function atualizarAnoExibido() {
    const el = document.getElementById('anoExibido');
    if (el) el.textContent = anoSelecionado;
    document.querySelectorAll('.anos-dropdown button').forEach(btn => {
      btn.classList.toggle('ativo-ano', Number(btn.dataset.ano) === anoSelecionado);
    });
  }

  function construirDropdownAnos() {
    const dropdown = document.getElementById('anosDropdown');
    if (!dropdown) return;
    const anoAtual = new Date().getFullYear();
    const anosDisponiveis = [];
    for (let ano = anoAtual; ano >= 2005; ano--) anosDisponiveis.push(ano);
    dropdown.innerHTML = anosDisponiveis.map(ano =>
      `<button data-ano="${ano}" class="${ano === anoSelecionado ? 'ativo-ano' : ''}">${ano}</button>`
    ).join('');
    dropdown.querySelectorAll('button').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        selecionarAno(Number(btn.dataset.ano));
        dropdown.classList.add('hidden');
      };
    });
  }

  // ── KPI helper ────────────────────────────────────────────────────────────

  function kpi(label, value, opts = {}) {
    const { icon = '', tone = C.text, delta = null } = opts;
    const up = delta != null && delta >= 0;
    return `
      <div class="kpi">
        <div class="kpi-top">${icon ? '<span style="color:' + (opts.iconColor || C.mutedDim) + '">' + icon + '</span>' : ''}<span class="kpi-label">${label}</span></div>
        <div class="kpi-value num" style="color:${tone}">${value}</div>
        ${delta != null ? `<div class="kpi-delta">
          <span style="color:${up ? C.cyan : C.red}">${up ? ICONS.trending : ICONS.trendDown}</span>
          <span class="pct num" style="color:${up ? C.cyan : C.red}">${up ? '+' : ''}${delta}%</span>
          <span class="vs">vs mês anterior</span>
        </div>` : ''}
      </div>`;
  }

  function calcDelta(curr, prev, key) {
    if (!prev || !prev[key] || prev[key] === 0) return null;
    return Math.round(((curr[key] - prev[key]) / prev[key]) * 100);
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function render() {
    const d      = dadosMensais[mesSelecionado];
    const prev   = mesSelecionado > 0 ? dadosMensais[mesSelecionado - 1] : null;
    const ytdValor = dadosMensais.slice(0, mesSelecionado + 1).reduce((s, m) => s + m.valorAprovado, 0);
    const ytdProp  = dadosMensais.slice(0, mesSelecionado + 1).reduce((s, m) => s + m.propostas, 0);
    const taxaConv = d.propostas > 0 ? Math.round((d.propostasAprovadas / d.propostas) * 100) : 0;
    const ticket   = d.propostasAprovadas > 0 ? Math.round(d.valorAprovado / d.propostasAprovadas) : 0;

    const funil = [
      { label:'Abertas',    value: d.propostasAbertas,    color:'#4a5162' },
      { label:'Negociando', value: d.propostasNegociando, color: C.amber  },
      { label:'Aprovadas',  value: d.propostasAprovadas,  color: C.cyan   },
      { label:'Perdidas',   value: d.propostasPerdidas,   color: C.red    },
    ];
    const funilMax = Math.max(...funil.map(f => f.value), 1);

    const statusLabels = ['Abertas','Aprovadas','Negociando','Perdidas','Pausadas'];
    const statusValues = [d.propostasAbertas, d.propostasAprovadas, d.propostasNegociando, d.propostasPerdidas, d.propostasPausadas];
    const statusColors = [C.amber, C.cyan, '#4a5162', C.red, C.violet];

    const recentes = todasPropostas
      .filter(p => { const dt = extrairPartesDaData(p.dataOrcamento); return dt && dt.ano === anoSelecionado && dt.mes === mesSelecionado; })
      .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0))
      .slice(0, 6);

    root.innerHTML = `
      <div class="dash-header">
        <div>
          <div class="eyebrow">DASHBOARD GERENCIAL — ${MESES_FULL[mesSelecionado].toUpperCase()} / ${anoSelecionado}</div>
          <h1 class="title disp">${MESES_FULL[mesSelecionado]} <span>/ ${anoSelecionado}</span></h1>
        </div>
        <div class="ytd">
          <div>Valor aprovado acumulado: <b class="num" style="color:${C.cyan}">${fmtBRL(ytdValor)}</b></div>
          <div>Propostas recebidas (ano): <b class="num" style="color:${C.amber}">${ytdProp}</b></div>
        </div>
      </div>

      <div class="section-label">${ICONS.box}<span>VISÃO GERAL</span><div class="section-rule"></div></div>
      <div class="kpi-grid">
        ${kpi('Total de clientes',  dadosGlobais.totalClientes,  { icon: ICONS.building })}
        ${kpi('Total de projetos',  dadosGlobais.totalProjetos,  { icon: ICONS.box })}
        ${kpi('Total de contratos', dadosGlobais.totalContratos, { icon: ICONS.check, tone: C.cyan })}
        ${kpi('Total de propostas', todasPropostas.length)}
      </div>

      <div class="section-label">${ICONS.trending}<span>COMERCIAL — ${MESES_FULL[mesSelecionado].toUpperCase()}</span><div class="section-rule"></div></div>
      <div class="kpi-grid">
        ${kpi('Propostas recebidas',   d.propostas          || 0, { delta: calcDelta(d, prev, 'propostas') })}
        ${kpi('Abertas',               d.propostasAbertas   || 0, { icon: ICONS.clock,  iconColor: C.muted,  tone: C.muted  })}
        ${kpi('Negociando',            d.propostasNegociando|| 0, { icon: ICONS.layers, iconColor: C.amber,  tone: C.amber  })}
        ${kpi('Aprovadas',             d.propostasAprovadas || 0, { icon: ICONS.check,  iconColor: C.cyan,   tone: C.cyan,  delta: calcDelta(d, prev, 'propostasAprovadas') })}
        ${kpi('Perdidas',              d.propostasPerdidas  || 0, { icon: ICONS.x,      iconColor: C.red,    tone: C.red    })}
        ${kpi('Taxa de conversão',     taxaConv + '%',             { tone: C.amber  })}
        ${kpi('Ticket médio',          fmtBRL(ticket))}
        ${kpi('Valor em propostas',    fmtBRL(d.valorPropostas  || 0), { tone: C.muted, delta: calcDelta(d, prev, 'valorPropostas')  })}
        ${kpi('Valor aprovado',        fmtBRL(d.valorAprovado   || 0), { tone: C.cyan,  delta: calcDelta(d, prev, 'valorAprovado')   })}
      </div>

      <div class="section-label">${ICONS.trending}<span>GRÁFICOS</span><div class="section-rule"></div></div>

      <div class="charts-row two">
        <div class="panel">
          <div class="panel-title disp">Valor aprovado por mês</div>
          <div class="panel-sub">Propostas fechadas (R$) — ${anoSelecionado}</div>
          <canvas id="barCanvas" height="90"></canvas>
        </div>
        <div class="panel">
          <div class="panel-title disp">Status das propostas</div>
          <div class="panel-sub">${MESES_FULL[mesSelecionado]} — distribuição</div>
          <div class="servicos-wrap">
            <canvas id="donutCanvas" style="max-width:45%;"></canvas>
            <div class="servicos-legend">
              ${d.propostas === 0
                ? '<div style="color:var(--text-soft,#6B7280);font-size:13px;">Nenhuma proposta neste período</div>'
                : statusLabels.map((s, i) => statusValues[i] > 0
                  ? `<div class="servico-row"><span class="servico-dot" style="background:${statusColors[i]}"></span><span class="servico-nome">${s}</span><span class="servico-val num">${statusValues[i]}</span></div>`
                  : '').join('')}
            </div>
          </div>
        </div>
      </div>

      <div class="charts-row three">
        <div class="panel">
          <div class="panel-title disp">Propostas por mês</div>
          <div class="panel-sub">Quantidade recebida — ${anoSelecionado}</div>
          <canvas id="lineCanvas" height="130"></canvas>
        </div>
        <div class="panel">
          <div class="panel-title disp">Funil comercial</div>
          <div class="panel-sub">${MESES_FULL[mesSelecionado]} — etapas</div>
          <div style="padding-top:8px;">
            ${funil.filter(f => f.value > 0).length === 0
              ? '<div style="color:var(--text-soft,#6B7280);font-size:13px;padding:12px 0;">Nenhuma proposta neste período.</div>'
              : funil.map(f => `
                  <div class="funil-item">
                    <div class="funil-top"><span class="l">${f.label}</span><span class="v num">${f.value}</span></div>
                    <div class="funil-bar-bg"><div class="funil-bar-fill" style="width:${(f.value/funilMax)*100}%;background:${f.color}"></div></div>
                  </div>`).join('')}
          </div>
        </div>
        <div class="panel">
          <div class="panel-title disp">Top clientes</div>
          <div class="panel-sub">${MESES_FULL[mesSelecionado]} — por valor</div>
          <div style="padding-top:6px;">
            ${d.topClientes.length === 0
              ? '<div style="color:var(--text-soft,#6B7280);font-size:13px;padding:12px 0;">Nenhum dado neste período.</div>'
              : d.topClientes.map(c => `
                  <div class="cliente-row">${ICONS.building}<span class="cliente-nome">${c.nome}</span><span class="cliente-val num">${fmtBRL(c.valor)}</span></div>`).join('')}
          </div>
        </div>
      </div>

      <div class="section-label">${ICONS.clock}<span>PROPOSTAS DO PERÍODO</span><div class="section-rule"></div></div>
      <div class="panel" style="overflow-x:auto;padding:0;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="color:var(--text-soft,#6B7280);border-bottom:1px solid var(--border,#E5E7EB);">
              <th style="padding:10px 14px;font-weight:500;text-align:left;">Nº Proposta</th>
              <th style="padding:10px 14px;font-weight:500;text-align:left;">Cliente</th>
              <th style="padding:10px 14px;font-weight:500;text-align:left;">Projeto</th>
              <th style="padding:10px 14px;font-weight:500;text-align:left;">Status</th>
              <th style="padding:10px 14px;font-weight:500;text-align:right;">Valor R$</th>
            </tr>
          </thead>
          <tbody>
            ${recentes.length === 0
              ? '<tr><td colspan="5" style="padding:16px 14px;color:var(--text-soft,#6B7280);text-align:center;">Nenhuma proposta registrada neste período.</td></tr>'
              : recentes.map(p => {
                  const sc = p.statusProposta==='Fechada' ? C.cyan : p.statusProposta==='Perdida' ? C.red : C.amber;
                  return `<tr style="border-bottom:1px solid var(--border,#E5E7EB);">
                    <td style="padding:9px 14px;font-family:monospace;">${p.numero||'—'}</td>
                    <td style="padding:9px 14px;">${p.cliente||'—'}</td>
                    <td style="padding:9px 14px;">${p.projeto||'—'}</td>
                    <td style="padding:9px 14px;"><span style="font-size:11px;padding:2px 8px;border-radius:4px;background:${sc}22;color:${sc}">${p.statusProposta}</span></td>
                    <td style="padding:9px 14px;text-align:right;font-family:monospace;">${fmtBRLFull(p.valorReais)}</td>
                  </tr>`;
                }).join('')}
          </tbody>
        </table>
      </div>
    `;

    // ── Gráficos ────────────────────────────────────────────────────────────
    const rv = ++chartRenderVersion;
    setTimeout(() => {
      if (rv !== chartRenderVersion) return;
      if (barChart)   { barChart.destroy();   barChart   = null; }
      if (lineChart)  { lineChart.destroy();  lineChart  = null; }
      if (donutChart) { donutChart.destroy(); donutChart = null; }

      if (typeof window.Chart === 'undefined') {
        console.warn('[Dashboard] Chart.js não carregado');
        return;
      }

      const barCanvas   = root.querySelector('#barCanvas');
      const lineCanvas  = root.querySelector('#lineCanvas');
      const donutCanvas = root.querySelector('#donutCanvas');

      if (barCanvas) {
        barCanvas.style.cssText = 'width:100%;height:220px;';
        barChart = new window.Chart(barCanvas.getContext('2d'), {
          type: 'bar',
          data: {
            labels: MESES_ABREV,
            datasets: [{
              data: dadosMensais.map(m => m.valorAprovado),
              backgroundColor: dadosMensais.map((_, i) => i === mesSelecionado ? C.amber : '#333a48'),
              borderRadius: 4, maxBarThickness: 34,
            }]
          },
          options: {
            responsive:true, maintainAspectRatio:false,
            plugins: { legend:{display:false}, tooltip:{ backgroundColor:C.panelHi, borderColor:C.line, borderWidth:1, titleColor:C.text, bodyColor:C.text, callbacks:{ label: ctx => fmtBRLFull(ctx.parsed.y) } } },
            scales: {
              x: { grid:{display:false}, ticks:{color:C.mutedDim, font:{family:'JetBrains Mono',size:11}} },
              y: { grid:{color:C.lineSoft}, ticks:{color:C.mutedDim, font:{family:'JetBrains Mono',size:10}, callback: v => fmtBRL(v)} }
            },
            onClick: (_, els) => { if (els.length) { selecionarMes(els[0].index); } }
          }
        });
      }

      if (lineCanvas) {
        lineCanvas.style.cssText = 'width:100%;height:180px;';
        lineChart = new window.Chart(lineCanvas.getContext('2d'), {
          type: 'line',
          data: {
            labels: MESES_ABREV,
            datasets: [{
              data: dadosMensais.map(m => m.propostas),
              borderColor: C.cyan, backgroundColor: C.cyan + '22',
              fill:true, tension:0.35, pointRadius:3, pointBackgroundColor:C.cyan,
            }]
          },
          options: {
            responsive:true, maintainAspectRatio:false,
            plugins: { legend:{display:false}, tooltip:{ backgroundColor:C.panelHi, borderColor:C.line, borderWidth:1, titleColor:C.text, bodyColor:C.text } },
            scales: {
              x: { grid:{display:false}, ticks:{color:C.mutedDim, font:{family:'JetBrains Mono',size:10}} },
              y: { grid:{color:C.lineSoft}, ticks:{color:C.mutedDim, font:{family:'JetBrains Mono',size:10}} }
            }
          }
        });
      }

      const donutData   = statusValues.filter((v,i) => statusValues[i] > 0);
      const donutLabels = statusLabels.filter((_,i) => statusValues[i] > 0);
      const donutColors = statusColors.filter((_,i) => statusValues[i] > 0);
      if (donutCanvas && donutData.length > 0) {
        donutCanvas.style.cssText = 'width:100%;height:220px;';
        donutChart = new window.Chart(donutCanvas.getContext('2d'), {
          type: 'doughnut',
          data: { labels:donutLabels, datasets:[{ data:donutData, backgroundColor:donutColors, borderWidth:0 }] },
          options: {
            responsive:true, maintainAspectRatio:false, cutout:'62%',
            plugins: { legend:{display:false}, tooltip:{ backgroundColor:C.panelHi, borderColor:C.line, borderWidth:1, titleColor:C.text, bodyColor:C.text } }
          }
        });
      }
    }, 40);
  }

  // ── Carregamento do Supabase ──────────────────────────────────────────────

  async function carregarDashboard() {
    try {
      console.log('[Dashboard] Iniciando carregamento...');

      const supabase = window.supabaseClient;
      if (!supabase) throw new Error('window.supabaseClient não disponível');

      const [propostasR, clientesR, projetosR, contratosR] = await Promise.all([
        supabase.from('proposals').select('*'),
        supabase.from('clients').select('*'),
        supabase.from('projects').select('*'),
        supabase.from('contracts').select('*'),
      ]);

      const erro = propostasR.error || clientesR.error || projetosR.error || contratosR.error;
      if (erro) {
        console.error('[Dashboard] Erro ao carregar:', erro);
        root.innerHTML = `<div style="padding:40px;text-align:center;color:#EF4444;">
          <div style="font-size:16px;margin-bottom:8px;">Erro ao carregar dashboard</div>
          <div style="font-size:13px;margin-bottom:14px;">${erro.message}</div>
          <button onclick="window.carregarDashboard()" style="padding:7px 18px;cursor:pointer;border:1px solid #EF4444;border-radius:6px;background:transparent;color:#EF4444;">Tentar novamente</button>
        </div>`;
        alert('Erro ao carregar dashboard: ' + erro.message);
        return;
      }

      (clientesR.data || []).forEach((client) => {
        clientNameById.set(Number(client.id), client.legal_name || client.name || `Cliente #${client.id}`);
      });
      (projetosR.data || []).forEach((project) => {
        projectNameById.set(Number(project.id), project.name || `Projeto #${project.id}`);
      });

      todasPropostas = (propostasR.data || []).map(normalizarProposta);
      dadosGlobais = {
        totalClientes:  (clientesR.data  || []).length,
        totalProjetos:  (projetosR.data  || []).length,
        totalContratos: (contratosR.data || []).length,
      };

      console.log('[Dashboard] ✅ Dados carregados:', {
        propostas:  todasPropostas,
        clientes:   clientesR.data  || [],
        projetos:   projetosR.data  || [],
        contratos:  contratosR.data || [],
      });

      processarDadosDoDashboard();

    } catch (error) {
      console.error('[Dashboard] Erro inesperado:', error);
      root.innerHTML = `<div style="padding:40px;text-align:center;color:#EF4444;">
        <div style="font-size:16px;margin-bottom:8px;">Erro inesperado</div>
        <div style="font-size:13px;">${error.message}</div>
      </div>`;
      alert('Erro inesperado no dashboard: ' + error.message);
    }
  }

  // ── Inicialização ─────────────────────────────────────────────────────────

  window.carregarDashboard = carregarDashboard;

  document.addEventListener('DOMContentLoaded', () => {
    // Botões de mês
    document.querySelectorAll('.mes-filtro').forEach((btn, i) => {
      btn.addEventListener('click', () => selecionarMes(i));
    });
    // Marcar mês atual
    const btns = document.querySelectorAll('.mes-filtro');
    if (btns[mesSelecionado]) btns[mesSelecionado].classList.add('ativo');
    // Scroll para o mês atual
    if (btns[mesSelecionado]) btns[mesSelecionado].scrollIntoView({ inline: 'center', behavior: 'smooth' });

    // Botão de ano
    construirDropdownAnos();
    atualizarAnoExibido();

    const btnAno   = document.getElementById('btnAno');
    const dropdown = document.getElementById('anosDropdown');

    btnAno.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('hidden');
    });

    document.addEventListener('click', () => {
      dropdown.classList.add('hidden');
    });

    // Carregar dados
    carregarDashboard();
  });
  </script>
</body>
</html>
