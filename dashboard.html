<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard CRM</title>
<link rel="stylesheet" href="dash.css">
</head>
<body>
  <div class="dashboard-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">CRM</div>
        <div class="brand-text">
          <span>CRM</span>
          <small>Simultâneo</small>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item active" href="dashboard.html">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          </span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a class="nav-item" href="index.html">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><path d="M7 15l3-4 3 2 4-6"></path></svg>
          </span>
          <span class="nav-label">Funil</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="profile-avatar">J</div>
        <div class="profile-info">
          <span class="profile-name">João</span>
          <span class="profile-role">Gestor</span>
        </div>
      </div>
    </aside>

    <main class="dashboard-main">
      <div id="dash-root"></div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
  <script>
  (function(){
    // ---------------------------------------------------------------------
    // MOCK DATA — 12 meses de 2026
    // ---------------------------------------------------------------------
    const MESES = ["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
    const MESES_FULL = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

    function seedRandom(seed){
      let s = seed;
      return function(){ s = (s*9301+49297)%233280; return s/233280; };
    }

    const monthlyData = MESES.map((m,i)=>{
      const rnd = seedRandom(i*17+3);
      const abertas = Math.round(6+rnd()*6);
      const negociando = Math.round(3+rnd()*5);
      const fechadas = Math.round(4+rnd()*7);
      const perdidas = Math.round(1+rnd()*4);
      const total = abertas+negociando+fechadas+perdidas;
      const ticketMedio = Math.round(18000+rnd()*22000);
      const valorVendido = fechadas*ticketMedio;
      const valorNegociacao = negociando*(ticketMedio*0.9);
      const receita = Math.round(valorVendido*(0.55+rnd()*0.3));
      const parcelasPagas = Math.round(10+rnd()*14);
      const parcelasPendentes = Math.round(4+rnd()*8);
      const parcelasVencidas = Math.round(rnd()*4);
      const projetosAtivos = Math.round(8+rnd()*10);
      const aguardandoContrato = Math.round(1+rnd()*4);
      const emProducao = Math.round(4+rnd()*7);
      const concluidos = Math.round(3+rnd()*6);
      const v3d = Math.round(30+rnd()*25);
      const anim = Math.round(15+rnd()*20);
      const video = Math.round(10+rnd()*15);
      const tour = Math.round(8+rnd()*12);

      return {
        mes:m, mesFull:MESES_FULL[i],
        abertas,negociando,fechadas,perdidas,total,
        ticketMedio,valorVendido,valorNegociacao,
        taxaConversao: total? Math.round((fechadas/total)*100):0,
        receita,parcelasPagas,parcelasPendentes,parcelasVencidas,
        projetosAtivos,aguardandoContrato,emProducao,concluidos,
        servicos:[
          {nome:"Visualização 3D", valor:v3d},
          {nome:"Animação 3D", valor:anim},
          {nome:"Vídeo", valor:video},
          {nome:"Tour Virtual 360°", valor:tour},
        ],
        topClientes:[
          {nome:"Construtora Horizonte", valor:Math.round(valorVendido*0.32)},
          {nome:"Grupo Andrade Empreend.", valor:Math.round(valorVendido*0.24)},
          {nome:"Shopping Curitiba S.A.", valor:Math.round(valorVendido*0.18)},
          {nome:"Vetta Incorporadora", valor:Math.round(valorVendido*0.14)},
        ],
      };
    });

    function fmtBRL(v){
      return v>=1000 ? `R$ ${(v/1000).toLocaleString('pt-BR',{maximumFractionDigits:0})}k` : `R$ ${v.toLocaleString('pt-BR')}`;
    }
    function fmtBRLFull(v){ return `R$ ${v.toLocaleString('pt-BR',{maximumFractionDigits:0})}`; }

    const C = {
      void:'#12151a', panel:'#1a1e26', panelHi:'#212630',
      line:'#2a2f3b', lineSoft:'#232833',
      text:'#eceae4', muted:'#868b96', mutedDim:'#5c6270',
      amber:'#ff8a3d', amberDim:'#ff8a3d55',
      cyan:'#49d8c4', violet:'#9b8cff', red:'#ff6161',
    };

    const ICONS = {
      trending: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
      trendingDown: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>',
      clock: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
      check: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
      x: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
      layers: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>',
      dollar: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
      box: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>',
      alert: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
      building: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><line x1="10" y1="6" x2="10" y2="6"/><line x1="14" y1="6" x2="14" y2="6"/><line x1="10" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="14" y2="10"/><line x1="10" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="14" y2="14"/></svg>',
      chevLeft: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',
      chevRight: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
    };

    let selected = 6; // Julho
    let barChart, lineChart, donutChart;
    const root = document.getElementById('dash-root');

    function kpi({label, value, delta, icon, tone, id}){
      const up = delta!=null && delta>=0;
      return `
        <div class="kpi">
          <div class="kpi-top">${icon?`<span style="color:${tone||C.mutedDim}">${icon}</span>`:''}<span class="kpi-label">${label}</span></div>
          <div class="kpi-value num" style="color:${tone||C.text}">${value}</div>
          ${delta!=null?`
            <div class="kpi-delta">
              <span style="color:${up?C.cyan:C.red}">${up?ICONS.trending:ICONS.trendingDown}</span>
              <span class="pct num" style="color:${up?C.cyan:C.red}">${up?'+':''}${delta}%</span>
              <span class="vs">vs mês anterior</span>
            </div>`:''}
        </div>`;
    }

    function delta(curr, prev, key){
      if(!prev) return null;
      const c=curr[key], p=prev[key];
      if(p===0) return null;
      return Math.round(((c-p)/p)*100);
    }

    function render(){
      const data = monthlyData[selected];
      const prevData = monthlyData[selected-1];
      const ytdSlice = monthlyData.slice(0, selected+1);
      const ytdReceita = ytdSlice.reduce((s,m)=>s+m.receita,0);
      const ytdVendido = ytdSlice.reduce((s,m)=>s+m.valorVendido,0);

      const funil = [
        {label:'Abertas', value:data.abertas, color:'#4a5162'},
        {label:'Negociando', value:data.negociando, color:C.amber},
        {label:'Fechadas', value:data.fechadas, color:C.cyan},
        {label:'Perdidas', value:data.perdidas, color:C.red},
      ];
      const funilMax = Math.max(...funil.map(f=>f.value),1);

      root.innerHTML = `
        <div class="dash-header">
          <div>
            <div class="eyebrow">DASHBOARD GERENCIAL — VISÃO MENSAL</div>
            <h1 class="title disp">${data.mesFull} <span>/ 2026</span></h1>
          </div>
          <div class="ytd">
            <div>Receita acumulada (ano): <b class="num" style="color:${C.cyan}">${fmtBRL(ytdReceita)}</b></div>
            <div>Vendido acumulado (ano): <b class="num" style="color:${C.amber}">${fmtBRL(ytdVendido)}</b></div>
          </div>
        </div>

        <div class="scrubber">
          <button class="scrub-btn" id="prevBtn">${ICONS.chevLeft}</button>
          <div class="frames">
            ${MESES.map((m,i)=>`
              <div class="frame ${i===selected?'active':''}" data-i="${i}">
                <div class="frame-tick"></div>
                <div class="frame-label num">${m}</div>
              </div>`).join('')}
          </div>
          <button class="scrub-btn" id="nextBtn">${ICONS.chevRight}</button>
        </div>

        <div class="section-label">${ICONS.trending}<span>COMERCIAL</span><div class="section-rule"></div></div>
        <div class="kpi-grid">
          ${kpi({label:'Total de propostas', value:data.total, delta:delta(data,prevData,'total')})}
          ${kpi({label:'Abertas', value:data.abertas, icon:ICONS.clock, tone:C.muted})}
          ${kpi({label:'Negociando', value:data.negociando, icon:ICONS.layers, tone:C.amber})}
          ${kpi({label:'Fechadas', value:data.fechadas, icon:ICONS.check, tone:C.cyan, delta:delta(data,prevData,'fechadas')})}
          ${kpi({label:'Perdidas', value:data.perdidas, icon:ICONS.x, tone:C.red})}
          ${kpi({label:'Taxa de conversão', value:data.taxaConversao+'%', tone:C.amber})}
          ${kpi({label:'Ticket médio', value:fmtBRL(data.ticketMedio)})}
          ${kpi({label:'Valor vendido', value:fmtBRL(data.valorVendido), tone:C.cyan, delta:delta(data,prevData,'valorVendido')})}
          ${kpi({label:'Valor em negociação', value:fmtBRL(data.valorNegociacao), tone:C.amber})}
        </div>

        <div class="section-label">${ICONS.dollar}<span>FINANCEIRO</span><div class="section-rule"></div></div>
        <div class="kpi-grid">
          ${kpi({label:'Receita do mês', value:fmtBRL(data.receita), tone:C.cyan, delta:delta(data,prevData,'receita')})}
          ${kpi({label:'Receita acumulada (ano)', value:fmtBRL(ytdReceita)})}
          ${kpi({label:'Parcelas pagas', value:data.parcelasPagas, icon:ICONS.check, tone:C.cyan})}
          ${kpi({label:'Parcelas pendentes', value:data.parcelasPendentes, icon:ICONS.clock, tone:C.amber})}
          ${kpi({label:'Parcelas vencidas', value:data.parcelasVencidas, icon:ICONS.alert, tone:C.red})}
        </div>

        <div class="section-label">${ICONS.box}<span>OPERACIONAL</span><div class="section-rule"></div></div>
        <div class="kpi-grid">
          ${kpi({label:'Projetos ativos', value:data.projetosAtivos})}
          ${kpi({label:'Aguardando contrato', value:data.aguardandoContrato, tone:C.amber})}
          ${kpi({label:'Em produção', value:data.emProducao, tone:C.violet})}
          ${kpi({label:'Concluídos', value:data.concluidos, tone:C.cyan})}
        </div>

        <div class="section-label">${ICONS.trending}<span>GRÁFICOS</span><div class="section-rule"></div></div>

        <div class="charts-row two">
          <div class="panel">
            <div class="panel-title disp">Vendas por mês</div>
            <div class="panel-sub">Valor vendido (R$) — mês selecionado em destaque</div>
            <canvas id="barCanvas" height="90"></canvas>
          </div>
          <div class="panel">
            <div class="panel-title disp">Serviços mais vendidos</div>
            <div class="panel-sub">${data.mesFull} — participação (%)</div>
            <div class="servicos-wrap">
              <canvas id="donutCanvas" style="max-width:45%;"></canvas>
              <div class="servicos-legend">
                ${data.servicos.map((s,i)=>{
                  const color=[C.amber,C.cyan,C.violet,'#8b909c'][i];
                  return `<div class="servico-row"><span class="servico-dot" style="background:${color}"></span><span class="servico-nome">${s.nome}</span><span class="servico-val num">${s.valor}%</span></div>`;
                }).join('')}
              </div>
            </div>
          </div>
        </div>

        <div class="charts-row three">
          <div class="panel">
            <div class="panel-title disp">Evolução do faturamento</div>
            <div class="panel-sub">Receita mensal (R$)</div>
            <canvas id="lineCanvas" height="130"></canvas>
          </div>
          <div class="panel">
            <div class="panel-title disp">Conversão comercial</div>
            <div class="panel-sub">${data.mesFull} — funil de propostas</div>
            <div style="padding-top:8px;">
              ${funil.map(f=>`
                <div class="funil-item">
                  <div class="funil-top"><span class="l">${f.label}</span><span class="v num">${f.value}</span></div>
                  <div class="funil-bar-bg"><div class="funil-bar-fill" style="width:${(f.value/funilMax)*100}%; background:${f.color}"></div></div>
                </div>`).join('')}
            </div>
          </div>
          <div class="panel">
            <div class="panel-title disp">Vendas por cliente</div>
            <div class="panel-sub">${data.mesFull} — top clientes</div>
            <div style="padding-top:6px;">
              ${data.topClientes.map(c=>`
                <div class="cliente-row">${ICONS.building}<span class="cliente-nome">${c.nome}</span><span class="cliente-val num">${fmtBRL(c.valor)}</span></div>`).join('')}
            </div>
          </div>
        </div>
      `;

      // ---- wire up scrubber interactions ----
      root.querySelector('#prevBtn').onclick = () => { selected = Math.max(0, selected-1); render(); };
      root.querySelector('#nextBtn').onclick = () => { selected = Math.min(11, selected+1); render(); };
      root.querySelectorAll('.frame').forEach(el=>{
        el.onclick = () => { selected = parseInt(el.dataset.i,10); render(); };
      });

      // ---- charts ----
      requestAnimationFrame(() => {
        if(barChart) barChart.destroy();
        if(lineChart) lineChart.destroy();
        if(donutChart) donutChart.destroy();

        const barCanvas = root.querySelector('#barCanvas');
        const lineCanvas = root.querySelector('#lineCanvas');
        const donutCanvas = root.querySelector('#donutCanvas');

        if(!barCanvas || !lineCanvas || !donutCanvas || typeof window.Chart === 'undefined') return;

        const barCtx = barCanvas.getContext('2d');
        barChart = new window.Chart(barCtx, {
          type: 'bar',
          data: {
            labels: MESES,
            datasets: [{
              data: monthlyData.map(m=>m.valorVendido),
              backgroundColor: monthlyData.map((m,i)=> i===selected ? C.amber : '#333a48'),
              borderRadius: 4,
              maxBarThickness: 34,
            }]
          },
          options: {
            responsive:true,
            maintainAspectRatio:false,
            plugins:{ legend:{display:false}, tooltip:{
              backgroundColor:C.panelHi, borderColor:C.line, borderWidth:1, titleColor:C.text, bodyColor:C.text,
              callbacks:{ label: ctx => fmtBRLFull(ctx.parsed.y) }
            }},
            scales:{
              x:{ grid:{display:false}, ticks:{color:C.mutedDim, font:{family:'JetBrains Mono', size:11}} },
              y:{ grid:{color:C.lineSoft}, ticks:{color:C.mutedDim, font:{family:'JetBrains Mono', size:10}, callback:v=>fmtBRL(v)} }
            },
            onClick:(evt,elements)=>{ if(elements.length){ selected=elements[0].index; render(); } }
          }
        });

        const lineCtx = lineCanvas.getContext('2d');
        lineChart = new window.Chart(lineCtx, {
          type: 'line',
          data: {
            labels: MESES,
            datasets: [{
              data: monthlyData.map(m=>m.receita),
              borderColor: C.cyan, backgroundColor: C.cyan+'22',
              fill:true, tension:0.35, pointRadius:2.5, pointBackgroundColor:C.cyan,
            }]
          },
          options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{ legend:{display:false}, tooltip:{
              backgroundColor:C.panelHi, borderColor:C.line, borderWidth:1, titleColor:C.text, bodyColor:C.text,
              callbacks:{ label: ctx => fmtBRLFull(ctx.parsed.y) }
            }},
            scales:{
              x:{ grid:{display:false}, ticks:{color:C.mutedDim, font:{family:'JetBrains Mono', size:10} } },
              y:{ grid:{color:C.lineSoft}, ticks:{color:C.mutedDim, font:{family:'JetBrains Mono', size:10}, callback:v=>fmtBRL(v)} }
            }
          }
        });

        const donutCtx = donutCanvas.getContext('2d');
        donutChart = new window.Chart(donutCtx, {
          type:'doughnut',
          data:{
            labels: data.servicos.map(s=>s.nome),
            datasets:[{
              data: data.servicos.map(s=>s.valor),
              backgroundColor:[C.amber, C.cyan, C.violet, '#5c6270'],
              borderWidth:0,
            }]
          },
          options:{
            responsive:true,
            maintainAspectRatio:false,
            cutout:'62%',
            plugins:{ legend:{display:false}, tooltip:{
              backgroundColor:C.panelHi, borderColor:C.line, borderWidth:1, titleColor:C.text, bodyColor:C.text,
            }}
          }
        });
      });
    }

    render();
  })();
  </script>
</body>
</html>
