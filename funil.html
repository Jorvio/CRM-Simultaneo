<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funil de Vendas — CRM Simultâneo</title>
  <link rel="icon" type="image/png" href="./favicon.png?v=20260722-1">
  <link rel="apple-touch-icon" href="./favicon.png?v=20260722-1">
  <meta name="theme-color" content="#ffb800">
  <link rel="stylesheet" href="./shared.css?v=20260723-1">
  <link rel="stylesheet" href="auth.css?v=20260723-2">
  <link rel="stylesheet" href="./funil.css?v=20260723-5">
  <style>
    :root {
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --surface-alt: #F9FAFB;
      --border: #E5E7EB;
      --text: #111827;
      --text-soft: #6B7280;
      --text-faint: #9CA3AF;
      --accent: #2563EB;
      --accent-soft: #DBEAFE;
      --st-aberta: #2563EB;
      --st-aberta-bg: #DBEAFE;
      --st-negociando: #D97706;
      --st-negociando-bg: #FEF3C7;
      --st-fechada: #047857;
      --st-fechada-bg: #D1FAE5;
      --st-perdida: #DC2626;
      --st-perdida-bg: #FEE2E2;
      --st-pausada: #6B7280;
      --st-pausada-bg: #F3F4F6;
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }

    .page-shell { min-height: 100vh; background: var(--bg); display: flex; }
    .page-content { flex: 1; min-height: 100vh; padding: 24px; margin-left: 70px; }

    .header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .header-text h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .header-text p {
      margin: 4px 0 0 0;
      font-size: 12px;
      color: var(--text-soft);
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      flex: 1;
      min-width: 200px;
      max-width: 400px;
    }

    .search-box svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      flex-shrink: 0;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      width: 100%;
      font-family: inherit;
    }

    .search-box input::placeholder {
      color: var(--text-soft);
    }

    .toolbar-buttons {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s ease;
      font-family: inherit;
      text-decoration: none;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn.secondary:hover {
      background: var(--surface-alt);
    }

    .btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .filter-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      display: none;
    }

    .filter-panel.show {
      display: block;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-group input,
    .filter-group select {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
      outline: none;
    }

    .filter-group input:focus,
    .filter-group select:focus {
      border-color: var(--accent);
      background: white;
    }

    .filter-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .table-scroll {
      overflow-x: auto;
      max-height: 600px;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    tbody tr:hover {
      background: var(--surface-alt);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .action-button {
      background: none;
      border: none;
      padding: 4px 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: all 0.1s ease;
      color: var(--text-soft);
    }

    .action-button:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .action-button svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .client-project {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .client-project strong {
      font-weight: 600;
    }

    .client-project small {
      font-size: 12px;
      color: var(--text-soft);
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      text-align: center;
    }

    .badge.aberta { color: var(--st-aberta); background: var(--st-aberta-bg); }
    .badge.negociando { color: var(--st-negociando); background: var(--st-negociando-bg); }
    .badge.fechada { color: var(--st-fechada); background: var(--st-fechada-bg); }
    .badge.perdida { color: var(--st-perdida); background: var(--st-perdida-bg); }
    .badge.pausada { color: var(--st-pausada); background: var(--st-pausada-bg); }

    .state-message {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-soft);
    }

    .state-message .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .state-message .title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .state-message .description {
      font-size: 12px;
      color: var(--text-faint);
    }

    .table-footer {
      background: var(--surface-alt);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      font-size: 12px;
      color: var(--text-soft);
    }

    @media (max-width: 768px) {
      .page-content { margin-left: 0; padding: 12px; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .search-box { width: 100%; max-width: 100%; }
      .toolbar-buttons { width: 100%; margin-left: 0; }
      .filter-grid { grid-template-columns: 1fr; }
      thead th { font-size: 12px; padding: 8px 10px; }
      tbody td { padding: 8px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="sidebar-brand"></div>
      <nav class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="profile-avatar">—</div>
        <div class="profile-info">
          <span class="profile-name">Carregando…</span>
          <span class="profile-role">—</span>
        </div>
      </div>
    </aside>

    <main class="page-content">
      <div class="header">
        <div class="header-title">
          <div class="header-icon">
            <svg viewBox="0 0 24 24">
              <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" fill="currentColor"/>
            </svg>
          </div>
          <div class="header-text">
            <h1>Funil de Vendas</h1>
            <p>Gestão de propostas e oportunidades</p>
          </div>
        </div>
      </div>

      <div class="toolbar toolbar-search">
        <div class="toolbar-bottom">
          <div class="search-box">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/>
              <path d="M21 21l-4.35-4.35"/>
            </svg>
            <input id="searchInput" type="text" placeholder="Pesquisar proposta, cliente ou projeto...">
          </div>
          <div class="toolbar-buttons status-filters">
            <button id="btnFilters" class="btn secondary" title="Abrir filtros">
              <svg viewBox="0 0 24 24">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
              </svg>
              <span>Filtros</span>
              <span id="filterCount" style="display: none;"></span>
            </button>
            <a href="./proposta.html?returnTo=funil.html" class="btn btn-add" title="Criar nova proposta">
              <svg viewBox="0 0 24 24">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Nova Proposta
            </a>
          </div>
        </div>
      </div>

      <div id="filterPanel" class="filter-panel">
        <div class="filter-grid">
          <div class="filter-group">
            <label for="filterNumber">Número da Proposta</label>
            <input id="filterNumber" type="text" placeholder="Ex: 001">
          </div>
          <div class="filter-group">
            <label for="filterClient">Cliente</label>
            <input id="filterClient" type="text" placeholder="Pesquisar cliente...">
          </div>
          <div class="filter-group">
            <label for="filterProject">Projeto</label>
            <input id="filterProject" type="text" placeholder="Pesquisar projeto...">
          </div>
          <div class="filter-group">
            <label for="filterContact">Contato</label>
            <input id="filterContact" type="text" placeholder="Nome do contato...">
          </div>
          <div class="filter-group">
            <label for="filterPOC">Ponto de Contato</label>
            <input id="filterPOC" type="text" placeholder="Ponto de contato...">
          </div>
          <div class="filter-group">
            <label for="filterProposalStatus">Status Orçamento</label>
            <select id="filterProposalStatus" multiple>
              <option value="">Todos</option>
              <option value="Aberta">Aberta</option>
              <option value="Negociando">Negociando</option>
              <option value="Fechada">Fechada</option>
              <option value="Perdida">Perdida</option>
              <option value="Pausada">Pausada</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="filterProjectStatus">Status Andamento</label>
            <input id="filterProjectStatus" type="text" placeholder="Status...">
          </div>
          <div class="filter-group">
            <label for="filterBudgetDateFrom">Data Orçamento (De)</label>
            <input id="filterBudgetDateFrom" type="date">
          </div>
          <div class="filter-group">
            <label for="filterBudgetDateTo">Data Orçamento (Até)</label>
            <input id="filterBudgetDateTo" type="date">
          </div>
          <div class="filter-group">
            <label for="filterClosingDateFrom">Data Fechamento (De)</label>
            <input id="filterClosingDateFrom" type="date">
          </div>
          <div class="filter-group">
            <label for="filterClosingDateTo">Data Fechamento (Até)</label>
            <input id="filterClosingDateTo" type="date">
          </div>
          <div class="filter-group">
            <label for="filterMonth">Mês Fechamento</label>
            <input id="filterMonth" type="month">
          </div>
          <div class="filter-group">
            <label for="filterValueUSDMin">Valor Dólar (Mín)</label>
            <input id="filterValueUSDMin" type="number" placeholder="0.00" step="0.01">
          </div>
          <div class="filter-group">
            <label for="filterValueUSDMax">Valor Dólar (Máx)</label>
            <input id="filterValueUSDMax" type="number" placeholder="999999.99" step="0.01">
          </div>
          <div class="filter-group">
            <label for="filterValueBRLMin">Valor Reais (Mín)</label>
            <input id="filterValueBRLMin" type="number" placeholder="0.00" step="0.01">
          </div>
          <div class="filter-group">
            <label for="filterValueBRLMax">Valor Reais (Máx)</label>
            <input id="filterValueBRLMax" type="number" placeholder="999999.99" step="0.01">
          </div>
        </div>
        <div class="filter-buttons">
          <button id="btnFilterClear" class="btn secondary">Limpar Filtros</button>
          <button id="btnFilterApply" class="btn">Aplicar Filtros</button>
        </div>
      </div>

      <div class="table-wrapper">
        <div class="table-scroll">
          <table id="proposalTable">
            <thead>
              <tr>
                <th style="width: 40px;"></th>
                <th>N°</th>
                <th>CLIENTE - PROJETO</th>
                <th>CONTATO</th>
                <th>PONTO DE CONTATO</th>
                <th>DATA ORÇAMENTO</th>
                <th>DATA FECHAMENTO</th>
                <th>MÊS FECHAMENTO</th>
                <th>VALOR EXTERIOR</th>
                <th>VALOR REAIS</th>
                <th>STATUS ORÇAMENTO</th>
                <th>STATUS ANDAMENTO</th>
                <th>OBSERVAÇÕES</th>
              </tr>
            </thead>
            <tbody id="proposalTableBody">
              <tr>
                <td colspan="13" class="state-message">
                  <div class="title">Carregando propostas...</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="table-footer">
          <span id="footerInfo">0 propostas</span>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./auth-guard.js?v=20260722-11"></script>
  <script type="module" src="./sidebar.js?v=20260722-11"></script>
  <script type="module" src="./funil.js?v=20260723-13"></script>
</body>
</html>
