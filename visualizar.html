<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Visualizar — CRM</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="sidebar-brand"><div class="brand-icon">CRM</div><div class="brand-text"><span>CRM</span><small>Simultâneo</small></div></div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span></a>
        <a class="nav-item" href="index.html"><span class="nav-icon">📈</span><span class="nav-label">Funil</span></a>
        <a class="nav-item" href="clientes.html"><span class="nav-icon">👥</span><span class="nav-label">Clientes</span></a>
        <a class="nav-item" href="projetos.html"><span class="nav-icon">📁</span><span class="nav-label">Projetos</span></a>
      </nav>
    </aside>

    <main class="page-content">
      <div class="app">
        <div class="page-card">
          <div class="page-header">
            <div>
              <h1 class="page-title">Visualizar Registro</h1>
              <div class="page-subtext">Todos os dados cadastrados</div>
            </div>
            <div>
              <a class="btn-secondary" href="clientes.html">Voltar</a>
              <a class="btn" href="cliente-novo.html">Editar</a>
            </div>
          </div>
          <div class="page-body">
            <div id="recordContent">
              <p style="color:var(--ink-soft); padding:20px;">Carregando registro...</p>
            </div>

          </div>
        </div>
      </div>
    </main>
  </div>
  <script type="module">
  import { db, dbMessage } from './supabase.js';

  function getQueryParams() {
    return Object.fromEntries(new URLSearchParams(window.location.search));
  }

  async function renderRecord() {
    const params = getQueryParams();
    const content = document.getElementById('recordContent');
    if (!params.type || !params.id) {
      content.innerHTML = '<div class="empty-state">Registro não especificado. Use o botão Voltar para retornar.</div>';
      return;
    }

    try {
      if (params.type === 'client') {
        const client = await db.fetchClientById(Number(params.id));
        content.innerHTML = `
          <div class="card-grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:20px;">
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Empresa</h3>
              <p><strong>Cliente:</strong> ${client.name || ''}</p>
              <p><strong>Razão Social:</strong> ${client.razaoSocial || ''}</p>
              <p><strong>CNPJ:</strong> ${client.cnpj || ''}</p>
              <p><strong>Endereço:</strong> ${client.endereco || ''}</p>
            </div>
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Dados do Projeto</h3>
              <p><strong>Projeto:</strong> ${client.projeto || ''}</p>
              <p><strong>Serviços:</strong> ${client.servicos || ''}</p>
              <p><strong>Nº da Proposta:</strong> ${client.propostaNum || client.proposta_num || ''}</p>
            </div>
          </div>`;
      } else if (params.type === 'project') {
        const project = await db.fetchProjectById(Number(params.id));
        content.innerHTML = `
          <div class="card-grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:20px;">
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Projeto</h3>
              <p><strong>Nome do Projeto:</strong> ${project.name || ''}</p>
              <p><strong>Serviços:</strong> ${project.servicos || ''}</p>
              <p><strong>Nº da Proposta:</strong> ${project.propostaNum || project.proposta_num || ''}</p>
            </div>
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Detalhes</h3>
              <p><strong>Cliente:</strong> ${project.cliente || ''}</p>
              <p><strong>Responsável:</strong> ${project.responsavel || ''}</p>
              <p><strong>Status:</strong> ${project.status || ''}</p>
            </div>
          </div>`;
      } else {
        content.innerHTML = '<div class="empty-state">Tipo de registro inválido.</div>';
      }
    } catch (error) {
      console.error('[renderRecord] Erro ao carregar registro:', error);
      alert(`Erro ao carregar registro:\n${error.message || JSON.stringify(error)}`);
      content.innerHTML = '<div class="empty-state">Erro ao carregar registro. Veja o console para detalhes.</div>';
    }
  }

  renderRecord();
  </script>
</body>
</html>
