<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projetos</title>

<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="css/auth.css">
<style>
.project-actions {
  display: flex;
  flex-wrap: nowrap;
  gap: 8px;
  align-items: center;
}

.proposal-links {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.proposal-link {
  font-size: 12px;
  color: var(--brand, #2563eb);
  text-decoration: none;
}

.proposal-link:hover {
  text-decoration: underline;
}

.proposal-modal {
  position: fixed;
  inset: 0;
  display: none;
  z-index: 999;
}

.proposal-modal.open {
  display: block;
}

.proposal-modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.35);
}

.proposal-modal-panel {
  position: relative;
  max-width: 720px;
  margin: 60px auto;
  background: #fff;
  border: 1px solid #e1e6ee;
  border-radius: 12px;
  padding: 16px;
}

.proposal-management-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 360px;
  overflow: auto;
}

.proposal-management-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 10px;
  border: 1px solid #e1e6ee;
  border-radius: 8px;
}

.proposal-management-actions {
  display: flex;
  gap: 6px;
}

.btn-delete-proposal {
  border: 1px solid #dc2626;
  color: #dc2626;
  background: #ffffff;
}

.btn-delete-proposal:hover {
  color: #ffffff;
  background: #dc2626;
}
</style>

</head>
<body>

    <aside class="sidebar">

        <div class="brand-icon">CRM</div>
        <div class="brand-text">
          <span>CRM</span>
          <small>Simultâneo</small>
        </div>
      </div>

      <nav class="sidebar-nav">

        <a class="nav-item" href="funil.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><path d="M7 15l3-4 3 2 4-6"></path></svg></span><span class="nav-label">Funil</span></a>
        <a class="nav-item" href="clientes.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><path d="M20 8v6"></path><path d="M23 11h-6"></path></svg></span><span class="nav-label">Clientes</span></a>
        <a class="nav-item active" href="projetos.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18"></path><path d="M5 7v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7"></path><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></span><span class="nav-label">Projetos</span></a>

      <div class="sidebar-footer">
        <div class="profile-avatar">J</div>
        <div class="profile-info"><span class="profile-name">João</span><span class="profile-role">Gestor</span></div>
      </div>
    </aside>

    <main class="page-content">
      <div class="app">
        <div class="page-card">
          <div class="page-header">
            <div>
              <h1 class="page-title">Projetos</h1>
              <div class="page-subtext">Visão consolidada dos projetos e entregas</div>
            </div>
            <button class="btn-primary" id="btnNovoProjeto" type="button">+ Novo Projeto</button>
          </div>
          <div class="page-body">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Projeto</th>
                    <th>Cliente</th>
                    <th>Responsável</th>
                    <th>Services</th>
                    <th>Propostas</th>
                    <th>Status</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="projectTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div class="proposal-modal" id="proposalManagerModal" aria-hidden="true">
    <div class="proposal-modal-backdrop" id="proposalManagerBackdrop"></div>
    <div class="proposal-modal-panel">
      <div class="page-header" style="padding:0 0 12px 0; margin:0 0 12px 0; border-bottom:1px solid var(--border);">
        <div>
          <h2 class="page-title" style="font-size:18px; margin:0;">Gerenciar propostas</h2>
          <div class="page-subtext" id="proposalManagerSubtitle">Projeto</div>
        </div>
        <button class="btn-secondary" type="button" id="proposalManagerClose">Fechar</button>
      </div>
      <div class="proposal-management-list" id="proposalManagerList"></div>
    </div>
  </div>
  <script type="module">
  import './js/auth-guard.js';
  import './js/user-menu.js';
  import './js/ui.js';
  import { db, loadCurrentUserPermissions } from './js/supabase.js';

  await window.crmAuthReady;

  const access = await loadCurrentUserPermissions().catch(() => null);
  if (!access) {
    window.location.href = './login.html';
    throw new Error('Usuário não autenticado');
  }
  const permissions = access.permissions;
  const btnNovoProjeto = document.getElementById('btnNovoProjeto');
  btnNovoProjeto?.addEventListener('click', () => {
    window.location.href = './projeto-novo.html';
  });
  if (btnNovoProjeto && !permissions.podeAdicionar) {
    btnNovoProjeto.style.display = 'none';
  }
  const proposalManagerModal = document.getElementById('proposalManagerModal');
  const proposalManagerBackdrop = document.getElementById('proposalManagerBackdrop');
  const proposalManagerClose = document.getElementById('proposalManagerClose');
  const proposalManagerList = document.getElementById('proposalManagerList');
  const proposalManagerSubtitle = document.getElementById('proposalManagerSubtitle');
  const tableWrap = document.querySelector('.table-wrap');

  let projetosCache = [];
  let projetoGerenciadoId = null;

  function obterUrlAtualRelativa() {
    const arquivo = window.location.pathname.split('/').pop() || 'projetos.html';
    return arquivo + window.location.search + window.location.hash;
  }

  function criarUrlVisualizacao(type, id, extraParams = {}) {
    const returnTo = encodeURIComponent(obterUrlAtualRelativa());
    const params = new URLSearchParams({
      type: String(type),
      id: String(id),
      returnTo
    });

    Object.entries(extraParams).forEach(([key, value]) => {
      if (value !== null && value !== undefined && String(value) !== '') {
        params.set(key, String(value));
      }
    });

    return `./visualizar.html?${params.toString()}`;
  }

  function formatarMoeda(valor) {
    if (valor == null || valor === '') return '—';
    return Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function escaparHtml(valor) {
    return String(valor ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function renderPropostasDoProjeto(propostas) {
    if (!propostas || propostas.length === 0) {
      return '<div class="empty-state" style="padding:10px;">Este projeto ainda não possui propostas cadastradas.</div>';
    }

    return `
      <div class="proposal-links">
        ${propostas.map((p, index) => {
          const numero = escaparHtml(p.proposal_number || 'sem número');
          return `<a class="proposal-link" href="${criarUrlVisualizacao('proposal', p.id)}">Proposta ${index + 1}: ${numero}</a>`;
        }).join('')}
      </div>
    `;
  }

  function abrirGerenciarPropostas(projetoId) {
    const projeto = projetosCache.find((item) => item.id === projetoId);
    if (!projeto) return;

    projetoGerenciadoId = projetoId;

    proposalManagerSubtitle.textContent = projeto.name || 'Projeto';
    proposalManagerList.innerHTML = '';

    const propostas = projeto.propostas || [];
    if (!propostas.length) {
      proposalManagerList.innerHTML = '<div class="empty-state">Este projeto ainda não possui propostas cadastradas.</div>';
      proposalManagerModal.classList.add('open');
      proposalManagerModal.setAttribute('aria-hidden', 'false');
      return;
    }

    propostas.forEach((proposta) => {
      const numeroProposta = proposta.proposal_number || 'sem número';
      const item = document.createElement('div');
      item.className = 'proposal-management-item';
      item.innerHTML = `
        <span>Proposta ${escaparHtml(numeroProposta)}</span>
        <div class="proposal-management-actions">
          <a class="btn-secondary" href="${criarUrlVisualizacao('proposal', proposta.id)}">Visualizar</a>
          <button type="button" class="btn-delete-proposal">Excluir</button>
        </div>
      `;

      const deleteButton = item.querySelector('.btn-delete-proposal');
      deleteButton.addEventListener('click', async (event) => {
        event.preventDefault();
        event.stopPropagation();
        await excluirProposta(proposta);
      });

      proposalManagerList.appendChild(item);
    });

    proposalManagerModal.classList.add('open');
    proposalManagerModal.setAttribute('aria-hidden', 'false');
  }

  function fecharGerenciarPropostas() {
    projetoGerenciadoId = null;
    proposalManagerModal.classList.remove('open');
    proposalManagerModal.setAttribute('aria-hidden', 'true');
  }

  async function excluirProposta(proposta) {
    if (!permissions.podeExcluir) {
      showToast('Seu usuario nao possui permissao para excluir propostas.', 'error');
      return;
    }

    const numeroProposta = proposta.proposal_number || 'sem número';

    const confirmou = window.confirm(
      `Deseja realmente excluir a proposta nº ${numeroProposta}? Esta ação não poderá ser desfeita.`
    );

    if (!confirmou) {
      return;
    }

    try {
      await db.deleteProposal(proposta.id);
    } catch (error) {
      console.error('Erro completo ao excluir proposta:', error);
      showToast('Nao foi possivel excluir a proposta.', 'error');
      return;
    }

    showToast('Proposta excluida com sucesso.', 'success');
    await carregarProjetos();

    if (projetoGerenciadoId != null) {
      abrirGerenciarPropostas(projetoGerenciadoId);
    } else {
      fecharGerenciarPropostas();
    }
  }

  async function carregarProjetos() {
    const tableScrollTop = tableWrap ? tableWrap.scrollTop : 0;
    const tableScrollLeft = tableWrap ? tableWrap.scrollLeft : 0;

    try {
      const projetos = await db.fetchProjects();

      projetosCache = projetos || [];

      const tbody = document.getElementById('projectTableBody');
      tbody.innerHTML = '';
      if (!projetos || projetos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">Nenhum projeto encontrado.</div></td></tr>';
        return;
      }

      for (const projeto of projetos) {
        const nomeCliente = projeto.cliente?.legal_name || projeto.cliente?.name || 'Não informado';
        const nomeResponsavel = projeto.responsavel?.nome_completo || 'Não informado';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escaparHtml(projeto.name || '')}</td>
          <td>${escaparHtml(nomeCliente)}</td>
          <td>${escaparHtml(nomeResponsavel)}</td>
          <td>${escaparHtml(projeto.services || '')}</td>
          <td>${renderPropostasDoProjeto(projeto.propostas)}</td>
          <td>${escaparHtml(projeto.status || '')}</td>
          <td>
            <div class="project-actions">
              <a class="btn-secondary" href="${criarUrlVisualizacao('project', projeto.id)}">Visualizar</a>
              ${permissions.podeEditar ? `<a class="btn" href="./projeto-novo.html?id=${projeto.id}">Editar</a>` : ''}
              ${permissions.podeExcluir ? `<button class="btn-secondary" type="button" data-id="${projeto.id}">Excluir</button>` : ''}
              ${(permissions.podeEditar || permissions.podeExcluir) ? `<a class="btn-secondary" href="${criarUrlVisualizacao('project', projeto.id, { focus: 'propostas' })}">Gerenciar propostas</a>` : ''}
            </div>
          </td>
        `;
        const deleteButton = tr.querySelector('button[data-id]');

        if (deleteButton) {
          deleteButton.onclick = async () => {
            if (!permissions.podeExcluir) {
              showToast('Seu usuario nao possui permissao para excluir projetos.', 'error');
              return;
            }
            if (!confirm('Excluir projeto?')) return;
            try {
              await db.deleteProject(projeto.id);
              await carregarProjetos();
              showToast('Projeto excluido com sucesso.', 'success');
            } catch (error) {
              console.error('[deleteProject] Erro:', error);
              showToast('Nao foi possivel excluir o projeto.', 'error');
            }
          };
        }

        tbody.appendChild(tr);
      }

      if (tableWrap) {
        tableWrap.scrollTop = tableScrollTop;
        tableWrap.scrollLeft = tableScrollLeft;
      }
    } catch (error) {
      console.error('Erro completo ao carregar projetos:', error);
      showToast('Nao foi possivel carregar os projetos.', 'error');
    }
  }

  proposalManagerBackdrop.addEventListener('click', fecharGerenciarPropostas);
  proposalManagerClose.addEventListener('click', fecharGerenciarPropostas);

  carregarProjetos();
  </script>
</body>
</html>
