<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Visualizar — CRM</title>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="sidebar-brand"><div class="brand-icon">CRM</div><div class="brand-text"><span>CRM</span><small>Simultâneo</small></div></div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span></a>
        <a class="nav-item" href="index.html"><span class="nav-icon">📈</span><span class="nav-label">Funil</span></a>
        <a class="nav-item" href="clientes.html"><span class="nav-icon">👥</span><span class="nav-label">Clientes</span></a>
        <a class="nav-item" href="projetos.html"><span class="nav-icon">📁</span><span class="nav-label">Projetos</span></a>
      </nav>
    </aside>

    <main class="page-content">
      <div class="app">
        <div class="page-card">
          <div class="page-header">
            <div>
              <h1 class="page-title">Visualizar Registro</h1>
              <div class="page-subtext">Todos os dados cadastrados</div>
            </div>
            <div>
              <a class="btn-secondary" href="clientes.html">Voltar</a>
              <a class="btn" id="editClientLink" href="cliente-novo.html">Editar</a>
            </div>
          </div>
          <div class="page-body">
            <div id="recordContent">
              <p style="color:var(--ink-soft); padding:20px;">Carregando registro...</p>
            </div>

          </div>
        </div>
      </div>
    </main>
  </div>
  <script type="module">
  import './js/auth-guard.js';
  import './js/user-menu.js';
  import { db, dbMessage } from './js/supabase.js';

  function getQueryParams() {
    return Object.fromEntries(new URLSearchParams(window.location.search));
  }

  function somenteNumeros(valor) {
    return String(valor || '').replace(/\D/g, '');
  }

  function formatarCPF(valor) {
    const numeros = somenteNumeros(valor).slice(0, 11);
    return numeros
      .replace(/(\d{3})(\d)/, '$1.$2')
      .replace(/(\d{3})(\d)/, '$1.$2')
      .replace(/(\d{3})(\d{1,2})$/, '$1-$2');
  }

  function formatarCNPJ(valor) {
    const numeros = somenteNumeros(valor).slice(0, 14);
    return numeros
      .replace(/^(\d{2})(\d)/, '$1.$2')
      .replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3')
      .replace(/\.(\d{3})(\d)/, '.$1/$2')
      .replace(/(\d{4})(\d)/, '$1-$2');
  }

  function formatarData(dataIso) {
    if (!dataIso) return '—';
    const [y, m, d] = String(dataIso).split('T')[0].split('-');
    if (!y || !m || !d) return '—';
    return `${d}/${m}/${y}`;
  }

  function formatarMoeda(valor) {
    if (valor == null || valor === '') return '—';
    return Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  async function renderRecord() {
    const params = getQueryParams();
    const content = document.getElementById('recordContent');
    const editClientLink = document.getElementById('editClientLink');
    if (!params.type || !params.id) {
      content.innerHTML = '<div class="empty-state">Registro não especificado. Use o botão Voltar para retornar.</div>';
      return;
    }

    try {
      if (params.type === 'client') {
        const client = await db.fetchClientById(Number(params.id));
        const tipoCliente = client.client_type === 'PF' ? 'Pessoa Física' : client.client_type === 'PJ' ? 'Pessoa Jurídica' : '';
        editClientLink.href = `cliente-novo.html?id=${client.id}`;
        content.innerHTML = `
          <div class="card-grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:20px;">
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Empresa</h3>
              <p><strong>Cliente:</strong> ${client.name || ''}</p>
              <p><strong>Razão Social:</strong> ${client.legal_name || ''}</p>
              <p><strong>Tipo:</strong> ${tipoCliente}</p>
              <p><strong>CPF:</strong> ${formatarCPF(client.cpf || '')}</p>
              <p><strong>CNPJ:</strong> ${formatarCNPJ(client.cnpj || '')}</p>
              <p><strong>Endereço CNPJ:</strong> ${client.address || ''}</p>
            </div>
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Relacionamentos</h3>
              <p><strong>Projetos deste cliente:</strong> Consulte a aba de projetos para ver todos os vínculos.</p>
              <p><strong>Propostas:</strong> Cada proposta pertence a um projeto e também a este cliente.</p>
            </div>
          </div>`;
      } else if (params.type === 'project') {
        const project = await db.fetchProjectById(Number(params.id));
        const propostas = await db.fetchProposalsByProject(Number(params.id));
        const nomeCliente = project.client?.legal_name || project.client?.name || 'Não informado';
        const nomeResponsavel = project.responsavel?.nome_completo || 'Não informado';

        const blocoPropostas = !propostas || propostas.length === 0
          ? '<div class="empty-state">Este projeto ainda não possui propostas cadastradas.</div>'
          : `
            <div style="display:grid; gap:12px; margin-top:16px;">
              ${propostas.map((p) => `
                <div class="page-card" style="padding:14px; border:1px solid var(--border);">
                  <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px;">
                    <div>
                      <p style="margin:0 0 8px 0;"><strong>Proposta Nº ${p.proposal_number || 'Não informado'}</strong></p>
                      <p style="margin:0 0 4px 0;"><strong>Status:</strong> ${p.proposal_status || 'Não informado'}</p>
                      <p style="margin:0 0 4px 0;"><strong>Valor:</strong> ${formatarMoeda(p.value_brl)}</p>
                      <p style="margin:0;"><strong>Data:</strong> ${formatarData(p.budget_date || p.closing_date || p.created_at)}</p>
                    </div>
                    <div style="display:flex; gap:8px;">
                      <a class="btn-secondary" href="visualizar.html?type=proposal&id=${p.id}">Visualizar</a>
                      <a class="btn" href="index.html?proposalId=${p.id}">Editar</a>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          `;

        editClientLink.href = `projeto-novo.html?id=${project.id}`;
        content.innerHTML = `
          <div class="card-grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:20px;">
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Projeto</h3>
              <p><strong>Nome do Projeto:</strong> ${project.name || ''}</p>
              <p><strong>Serviços:</strong> ${project.services || ''}</p>
              <p><strong>Status:</strong> ${project.status || '—'}</p>
            </div>
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Informações relacionadas</h3>
              <p><strong>Cliente:</strong> ${nomeCliente}</p>
              <p><strong>Responsável:</strong> ${nomeResponsavel}</p>
            </div>
          </div>
          <div class="page-card" style="padding:18px; margin-top:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
              <h3 style="margin:0;">Propostas</h3>
              <a class="btn-primary" href="index.html?newProposal=1&clientId=${project.client_id || ''}&projectId=${project.id}">Nova Proposta</a>
            </div>
            ${blocoPropostas}
          </div>`;
      } else if (params.type === 'proposal') {
        const proposal = await db.fetchProposalById(Number(params.id));
        editClientLink.href = 'index.html';
        content.innerHTML = `
          <div class="card-grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:20px;">
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Proposta</h3>
              <p><strong>Número:</strong> ${proposal.proposal_number || '—'}</p>
              <p><strong>Cliente (ID):</strong> ${proposal.client_id ?? '—'}</p>
              <p><strong>Projeto (ID):</strong> ${proposal.project_id ?? '—'}</p>
              <p><strong>Data orçamento:</strong> ${formatarData(proposal.budget_date)}</p>
              <p><strong>Data fechamento:</strong> ${formatarData(proposal.closing_date)}</p>
            </div>
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Comercial</h3>
              <p><strong>Valor USD:</strong> ${proposal.value_usd ?? '—'}</p>
              <p><strong>Valor BRL:</strong> ${formatarMoeda(proposal.value_brl)}</p>
              <p><strong>Status proposta:</strong> ${proposal.proposal_status || '—'}</p>
              <p><strong>Status projeto:</strong> ${proposal.project_status || '—'}</p>
              <p><strong>Contato:</strong> ${proposal.contact_name || '—'}</p>
              <p><strong>Observações:</strong> ${proposal.notes || '—'}</p>
            </div>
          </div>`;
      } else {
        content.innerHTML = '<div class="empty-state">Tipo de registro inválido.</div>';
      }
    } catch (error) {
      console.error('[renderRecord] Erro ao carregar registro:', error);
      alert(`Erro ao carregar registro:\n${error.message || JSON.stringify(error)}`);
      content.innerHTML = '<div class="empty-state">Erro ao carregar registro. Veja o console para detalhes.</div>';
    }
  }

  renderRecord();
  </script>
</body>
</html>
