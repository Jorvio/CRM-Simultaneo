<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Visualizar — CRM</title>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="sidebar-brand"><div class="brand-icon">CRM</div><div class="brand-text"><span>CRM</span><small>Simultâneo</small></div></div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="dashboard.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></span><span class="nav-label">Dashboard</span></a>
        <a class="nav-item" href="funil.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><path d="M7 15l3-4 3 2 4-6"></path></svg></span><span class="nav-label">Funil</span></a>
        <a class="nav-item" href="clientes.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><path d="M20 8v6"></path><path d="M23 11h-6"></path></svg></span><span class="nav-label">Clientes</span></a>
        <a class="nav-item" href="projetos.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18"></path><path d="M5 7v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7"></path><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></span><span class="nav-label">Projetos</span></a>
      </nav>
    </aside>

    <main class="page-content">
      <div class="app">
        <div class="page-card">
          <div class="page-header">
            <div>
              <h1 class="page-title">Visualizar Registro</h1>
              <div class="page-subtext">Todos os dados cadastrados</div>
            </div>
            <div>
              <a class="btn-secondary" href="clientes.html">Voltar</a>
              <a class="btn" id="editClientLink" href="cliente-novo.html">Editar</a>
            </div>
          </div>
          <div class="page-body">
            <div id="recordContent">
              <p style="color:var(--ink-soft); padding:20px;">Carregando registro...</p>
            </div>

          </div>
        </div>
      </div>
    </main>
  </div>
  <script type="module">
  import './js/auth-guard.js';
  import './js/user-menu.js';
  import './js/ui.js';
  import { db } from './js/supabase.js';

  await window.crmAuthReady;

  const escapeHtml = window.escapeHtml || ((v) => String(v ?? ''));

  function getQueryParams() {
    return Object.fromEntries(new URLSearchParams(window.location.search));
  }

  function somenteNumeros(valor) {
    return String(valor || '').replace(/\D/g, '');
  }

  function formatarCPF(valor) {
    const numeros = somenteNumeros(valor).slice(0, 11);
    return numeros
      .replace(/(\d{3})(\d)/, '$1.$2')
      .replace(/(\d{3})(\d)/, '$1.$2')
      .replace(/(\d{3})(\d{1,2})$/, '$1-$2');
  }

  function formatarCNPJ(valor) {
    const numeros = somenteNumeros(valor).slice(0, 14);
    return numeros
      .replace(/^(\d{2})(\d)/, '$1.$2')
      .replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3')
      .replace(/\.(\d{3})(\d)/, '.$1/$2')
      .replace(/(\d{4})(\d)/, '$1-$2');
  }

  function formatarData(dataIso) {
    if (!dataIso) return '—';
    const [y, m, d] = String(dataIso).split('T')[0].split('-');
    if (!y || !m || !d) return '—';
    return `${d}/${m}/${y}`;
  }

  function formatarMoeda(valor) {
    if (valor == null || valor === '') return '—';
    return Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function renderCampo(label, value) {
    const resolved = value == null || value === '' ? 'Não informado' : String(value);
    return `<p><strong>${label}:</strong> ${escapeHtml(resolved)}</p>`;
  }

  async function renderRecord() {
    const params = getQueryParams();
    const content = document.getElementById('recordContent');
    const editClientLink = document.getElementById('editClientLink');

    if (!params.type || !params.id) {
      content.innerHTML = '<div class="empty-state">Registro nao especificado.</div>';
      return;
    }

    try {
      if (params.type === 'client') {
        const client = await db.fetchClientById(Number(params.id));
        const tipoCliente = client.client_type === 'PF' ? 'Pessoa Fisica' : client.client_type === 'PJ' ? 'Pessoa Juridica' : 'Nao informado';
        editClientLink.href = `./cliente-novo.html?id=${client.id}`;
        content.innerHTML = `
          <div class="card-grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:20px;">
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Cliente</h3>
              ${renderCampo('ID', client.id)}
              ${renderCampo('Nome', client.name)}
              ${renderCampo('Razao Social', client.legal_name)}
              ${renderCampo('Tipo', tipoCliente)}
              ${renderCampo('CPF', client.cpf ? formatarCPF(client.cpf) : null)}
              ${renderCampo('CNPJ', client.cnpj ? formatarCNPJ(client.cnpj) : null)}
              ${renderCampo('Endereco', client.address)}
            </div>
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Auditoria</h3>
              ${renderCampo('Criado em', formatarData(client.created_at))}
              ${renderCampo('Atualizado em', formatarData(client.updated_at))}
            </div>
          </div>`;
        return;
      }

      if (params.type === 'project') {
        const project = await db.fetchProjectById(Number(params.id));
        const propostas = Array.isArray(project.propostas)
          ? project.propostas
          : await db.fetchProposalsByProject(Number(params.id));

        const cliente = project.cliente || null;
        const responsavel = project.responsavel || null;

        const blocoPropostas = !propostas || propostas.length === 0
          ? '<div class="empty-state">Este projeto ainda nao possui propostas cadastradas.</div>'
          : `
            <div style="display:grid; gap:12px; margin-top:16px;">
              ${propostas.map((p) => `
                <div class="page-card" style="padding:14px; border:1px solid var(--border);">
                  ${renderCampo('Proposta', p.proposal_number)}
                  ${renderCampo('Status da proposta', p.proposal_status)}
                  ${renderCampo('Status do projeto', p.project_status)}
                  ${renderCampo('Data de orcamento', formatarData(p.budget_date))}
                  ${renderCampo('Data de fechamento', formatarData(p.closing_date))}
                  ${renderCampo('Valor BRL', formatarMoeda(p.value_brl))}
                  ${renderCampo('Valor USD', p.value_usd)}
                  ${renderCampo('Contato', p.contact_name)}
                  ${renderCampo('Ponto de contato', p.point_of_contact)}
                  ${renderCampo('Observacoes', p.notes)}
                  <div style="display:flex; gap:8px; margin-top:10px;">
                    <a class="btn-secondary" href="./visualizar.html?type=proposal&id=${p.id}">Visualizar</a>
                    <a class="btn" href="./funil.html?proposalId=${p.id}">Editar</a>
                  </div>
                </div>
              `).join('')}
            </div>
          `;

        editClientLink.href = `./projeto-novo.html?id=${project.id}`;
        content.innerHTML = `
          <div class="card-grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:20px;">
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Projeto</h3>
              ${renderCampo('ID', project.id)}
              ${renderCampo('Nome', project.name)}
              ${renderCampo('Servicos', project.services)}
              ${renderCampo('Status', project.status)}
              ${renderCampo('Criado em', formatarData(project.created_at))}
              ${renderCampo('Atualizado em', formatarData(project.updated_at))}
            </div>
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Cliente relacionado</h3>
              ${renderCampo('Nome', cliente?.name)}
              ${renderCampo('Razao social', cliente?.legal_name)}
              ${renderCampo('Tipo', cliente?.client_type)}
              ${renderCampo('CPF', cliente?.cpf ? formatarCPF(cliente.cpf) : null)}
              ${renderCampo('CNPJ', cliente?.cnpj ? formatarCNPJ(cliente.cnpj) : null)}
              ${renderCampo('Endereco', cliente?.address)}
            </div>
          </div>
          <div class="page-card" style="padding:18px; margin-top:20px;">
            <h3 style="margin-top:0;">Responsavel relacionado</h3>
            ${renderCampo('Nome completo', responsavel?.nome_completo)}
            ${renderCampo('CPF', responsavel?.cpf)}
            ${renderCampo('RG orgao emissor', responsavel?.rg_orgao_emissor)}
            ${renderCampo('Profissao', responsavel?.profissao)}
            ${renderCampo('Estado civil', responsavel?.estado_civil)}
            ${renderCampo('Endereco', responsavel?.endereco_responsavel)}
            ${renderCampo('Email', responsavel?.email)}
            ${renderCampo('Telefone', responsavel?.telefone)}
            ${renderCampo('Email copia', responsavel?.email_copia)}
          </div>
          <div id="propostas-area" class="page-card" style="padding:18px; margin-top:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
              <h3 style="margin:0;">Propostas</h3>
              <a class="btn-primary" href="./funil.html?newProposal=1&projectId=${project.id}&clientId=${project.client_id || ''}">Nova Proposta</a>
            </div>
            ${blocoPropostas}
          </div>`;

        if (params.focus === 'propostas') {
          document.getElementById('propostas-area')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        return;
      }

      if (params.type === 'proposal') {
        const proposal = await db.fetchProposalById(Number(params.id));
        editClientLink.href = './funil.html';
        content.innerHTML = `
          <div class="card-grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:20px;">
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Proposta</h3>
              ${renderCampo('ID', proposal.id)}
              ${renderCampo('Numero', proposal.proposal_number)}
              ${renderCampo('Cliente ID', proposal.client_id)}
              ${renderCampo('Projeto ID', proposal.project_id)}
              ${renderCampo('Data orcamento', formatarData(proposal.budget_date))}
              ${renderCampo('Data fechamento', formatarData(proposal.closing_date))}
              ${renderCampo('Mes fechamento', proposal.closing_month)}
            </div>
            <div class="page-card" style="padding:18px;">
              <h3 style="margin-top:0;">Comercial</h3>
              ${renderCampo('Valor USD', proposal.value_usd)}
              ${renderCampo('Valor BRL', formatarMoeda(proposal.value_brl))}
              ${renderCampo('Status proposta', proposal.proposal_status)}
              ${renderCampo('Status projeto', proposal.project_status)}
              ${renderCampo('Contato', proposal.contact_name)}
              ${renderCampo('Ponto de contato', proposal.point_of_contact)}
              ${renderCampo('Observacoes', proposal.notes)}
            </div>
          </div>`;
        return;
      }

      content.innerHTML = '<div class="empty-state">Tipo de registro invalido.</div>';
    } catch (error) {
      console.error('[visualizar]', {
        code: error?.code,
        message: error?.message,
        details: error?.details,
        hint: error?.hint
      });
      showToast('Nao foi possivel carregar o registro.', 'error');
      content.innerHTML = '<div class="empty-state">Erro ao carregar registro.</div>';
    }
  }

  renderRecord();
  </script>
</body>
</html>
