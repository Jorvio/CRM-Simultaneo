    <main class="page-content">
      <div class="app">
        <div class="page-card">
          <div class="page-header">
            <div>
              <h1 class="page-title">Clientes</h1>
              <div class="page-subtext">Gestão de clientes e relacionamento comercial</div>
            </div>
            <button class="btn-primary" id="btnNovoCliente" type="button">+ Novo Cliente</button>
          </div>
          <div class="page-body">
            <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Cliente</th>
                      <th>Razão Social</th>
                      <th>Tipo</th>
                      <th>CPF</th>
                      <th>CNPJ</th>
                      <th>Endereço CNPJ</th>
                      <th>Ações</th>
                    </tr>
                  </thead>
                  <tbody id="clientTableBody"></tbody>
                </table>
              </div>
          </div>
          <script type="module">
          import './js/auth-guard.js';
          import './js/user-menu.js';
          import './js/ui.js';
          import { db, dbMessage, loadCurrentUserPermissions } from './js/supabase.js';

          await window.crmAuthReady;

          const access = await loadCurrentUserPermissions().catch(() => null);
          if (!access) {
            window.location.href = './login.html';
            throw new Error('Usuário não autenticado');
          }

          const permissions = access.permissions;
          const btnNovoCliente = document.getElementById('btnNovoCliente');
          btnNovoCliente?.addEventListener('click', () => {
            window.location.href = './cliente-novo.html';
          });

          const escapeHtml = window.escapeHtml || ((v) => String(v ?? ''));
          if (btnNovoCliente && !permissions.podeAdicionar) {
            btnNovoCliente.style.display = 'none';
          }

          async function renderClients() {
            try {
              const clients = await db.fetchClients();
              const tbody = document.getElementById('clientTableBody');
              tbody.innerHTML = '';
              if (!clients || clients.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">Nenhum cliente cadastrado.</div></td></tr>';
                return;
              }
              clients.forEach(client => {
                const tipoCliente = client.client_type === 'PF' ? 'Pessoa Física' : client.client_type === 'PJ' ? 'Pessoa Jurídica' : '';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                  <td>${escapeHtml(client.name || '')}</td>
                  <td>${escapeHtml(client.legal_name || '')}</td>
                  <td>${escapeHtml(tipoCliente)}</td>
                  <td>${escapeHtml(formatarCPF(client.cpf || ''))}</td>
                  <td>${escapeHtml(formatarCNPJ(client.cnpj || ''))}</td>
                  <td>${escapeHtml(client.address || '')}</td>
                  <td>
                    <div style="display:flex;gap:8px;">
                      <a class="btn-secondary" href="visualizar.html?type=client&id=${client.id}">Visualizar</a>
                      ${permissions.podeEditar ? `<a class="btn" href="cliente-novo.html?id=${client.id}">Editar</a>` : ''}
                      ${permissions.podeExcluir ? `<button class="btn-secondary" type="button" data-id="${client.id}">Excluir</button>` : ''}
                    </div>
                  </td>
                `;
                const deleteButton = tr.querySelector('button[data-id]');
                if (deleteButton) {
                  deleteButton.onclick = async () => {
                  if (!permissions.podeExcluir) {
                    showToast('Seu usuario nao possui permissao para excluir clientes.', 'error');
                    return;
                  }
                  if (!confirm('Excluir cliente?')) return;
                  try {
                    await db.deleteClient(client.id);
                    renderClients();
                    showToast('Cliente excluido com sucesso.', 'success');
                  } catch (error) {
                    console.error('[deleteClient] Erro:', error);
                    showToast('Nao foi possivel excluir o cliente.', 'error');
                  }
                  };
                }
                tbody.appendChild(tr);
              });
            } catch (error) {
              dbMessage('Erro ao carregar clientes', 'error');
            }
          }

          function somenteNumeros(valor) {
            return String(valor || '').replace(/\D/g, '');
          }

          function formatarCPF(valor) {
            const numeros = somenteNumeros(valor).slice(0, 11);
            return numeros
              .replace(/(\d{3})(\d)/, '$1.$2')
              .replace(/(\d{3})(\d)/, '$1.$2')
              .replace(/(\d{3})(\d{1,2})$/, '$1-$2');
          }

          function formatarCNPJ(valor) {
            const numeros = somenteNumeros(valor).slice(0, 14);
            return numeros
              .replace(/^(\d{2})(\d)/, '$1.$2')
              .replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3')
              .replace(/\.(\d{3})(\d)/, '.$1/$2')
              .replace(/(\d{4})(\d)/, '$1-$2');
          }

          renderClients();
          </script>
        </div>
      </div>
