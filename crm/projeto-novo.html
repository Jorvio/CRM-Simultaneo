      <div class="sidebar-footer"><div class="profile-avatar">J</div><div class="profile-info"><span class="profile-name">João</span><span class="profile-role">Gestor</span></div></div>
    </aside>
    <main class="page-content">
      <div class="app">
        <div class="page-card">
          <div class="page-header"><div><h1 class="page-title">Cadastrar Projeto</h1><div class="page-subtext">Vincule o projeto a um cliente e inclua os dados complementares</div></div></div>
          <div class="page-body">
            <div class="form-grid" style="grid-template-columns:1fr; gap:12px; margin-bottom:12px;">
              <div class="field"><label for="fldProjClient">Cliente</label><select id="fldProjClient"><option value="">Selecione um cliente</option></select></div>
              <div class="field"><label for="fldProjName">Nome do Projeto *</label><input id="fldProjName" type="text" placeholder="Nome do projeto" required></div>
              <div class="field"><label>Serviços</label><input id="fldProjServ" type="text" placeholder="Serviços incluídos"></div>
              <div class="field"><label>Status do Projeto</label><input id="fldProjStatus" type="text" placeholder="Ex: Em andamento"></div>
            </div>
            <div class="card-grid">
              <div class="page-card" style="padding:20px;">
                <div class="page-header" style="padding:0 0 20px 0; border-bottom:1px solid var(--border); margin-bottom:20px;">
                  <h2 class="page-title" style="font-size:18px; margin:0;">Responsável</h2>
                </div>
                <div class="form-grid" style="grid-template-columns:1fr; gap:16px;">
                  <div class="field"><label>Nome Completo</label><input id="fldRespNome" type="text" placeholder="Nome completo"></div>
                  <div class="field"><label>CPF</label><input id="fldRespCpf" type="text" placeholder="000.000.000-00"></div>
                  <div class="field"><label>RG - Órgão Emissor</label><input id="fldRespRg" type="text" placeholder="RG e órgão emissor"></div>
                  <div class="field"><label>Profissão</label><input id="fldRespProfissao" type="text" placeholder="Profissão"></div>
                  <div class="field"><label>Estado Civil</label><input id="fldRespEstadoCivil" type="text" placeholder="Estado civil"></div>
                  <div class="field"><label>Endereço Completo Responsável</label><textarea id="fldRespEndereco" placeholder="Rua, número, bairro, cidade, estado, CEP"></textarea></div>
                  <div class="field"><label>E-mail</label><input id="fldRespEmail" type="email" placeholder="email@empresa.com"></div>
                  <div class="field"><label>Telefone</label><input id="fldRespTelefone" type="text" placeholder="(47) 99999-9999"></div>
                  <div class="field"><label>E-mail em cópia</label><input id="fldRespEmailCopia" type="email" placeholder="email.copia@empresa.com"></div>
                </div>
              </div>
              <div class="page-card" style="padding:20px;">
                <div class="page-header" style="padding:0 0 20px 0; border-bottom:1px solid var(--border); margin-bottom:20px;">
                  <h2 class="page-title" style="font-size:18px; margin:0;">Financeiro</h2>
                </div>
                <div class="form-grid" style="grid-template-columns:1fr; gap:16px;">
                  <div class="field"><label>Forma de pagamento</label><input id="fldPaymentMethod" type="text" placeholder="Ex: Boleto, Cartão, Transferência"></div>
                  <div class="field"><label>Forma de parcelamento</label><input id="fldInstallmentTerms" type="text" placeholder="Ex: 3x, 6x, 12x"></div>
                  <div class="field"><label>Dia de vencimento das parcelas</label><input id="fldInstallmentDueDay" type="text" placeholder="Dia do mês"></div>
                  <div class="field"><label>Valor total do contrato</label><input id="fldContractTotal" type="text" placeholder="R$ 0,00"></div>
                  <div class="field"><label>Valor das parcelas</label><input id="fldInstallmentValue" type="text" placeholder="R$ 0,00"></div>
                </div>
              </div>
              <div class="page-card" style="padding:20px;">
                <div class="page-header" style="padding:0 0 20px 0; border-bottom:1px solid var(--border); margin-bottom:20px;">
                  <h2 class="page-title" style="font-size:18px; margin:0;">Contrato</h2>
                </div>
                <div class="form-grid" style="grid-template-columns:1fr; gap:16px;">
                  <div class="field"><label>Envio do contrato</label><input id="fldContractDeliveryMethod" type="text" placeholder="Ex: Por e-mail, correio, assinatura digital"></div>
                  <div class="field"><label>Envio de cobranças</label><input id="fldBillingDeliveryMethod" type="text" placeholder="Ex: Mensal, quinzenal"></div>
                </div>
              </div>
              <div class="page-card" style="padding:20px;">
                <div class="page-header" style="padding:0 0 20px 0; border-bottom:1px solid var(--border); margin-bottom:20px;">
                  <h2 class="page-title" style="font-size:18px; margin:0;">Acompanhamento do Projeto</h2>
                </div>
                <div class="form-grid" style="grid-template-columns:1fr; gap:16px;">
                  <div class="field"><label>Solicitação de arquivos de projeto</label><input id="fldProjectFilesRequest" type="text" placeholder="Ex: Modelos, plantas, texturas"></div>
                  <div class="field"><label>Entregas e aprovações</label><textarea id="fldDeliveriesApprovals" placeholder="Fases de entrega e aprovação"></textarea></div>
                </div>
              </div>
            </div>
            <div class="actions"><button class="btn-primary" id="btnSaveProj">Salvar Projeto</button><button class="btn-secondary" onclick="history.back()">Cancelar</button></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script type="module">
  import './js/auth-guard.js';
  import './js/user-menu.js';
  import './js/ui.js';
  import { db, loadCurrentUserPermissions } from './js/supabase.js';

  await window.crmAuthReady;
  const params = new URLSearchParams(window.location.search);
  const projectId = params.get('id');

  const access = await loadCurrentUserPermissions().catch(() => null);
  if (!access) {
    window.location.href = './login.html';
    throw new Error('Usuário não autenticado');
  }
  const permissions = access.permissions;

  if (projectId && !permissions.podeEditar) {
    showToast('Seu usuario nao possui permissao para editar projetos.', 'error');
    window.location.href = './projetos.html';
    throw new Error('Sem permissão de edição');
  }

  if (!projectId && !permissions.podeAdicionar) {
    showToast('Seu usuario nao possui permissao para cadastrar projetos.', 'error');
    window.location.href = './projetos.html';
    throw new Error('Sem permissão de cadastro');
  }

  async function carregarClientes() {
    const select = document.getElementById('fldProjClient');
    try {
      const clients = await db.fetchClients();
      select.innerHTML = '<option value="">Selecione um cliente</option>';
      (clients || []).forEach((client) => {
        const option = document.createElement('option');
        option.value = String(client.id);
        const label = client.legal_name || client.name || `Cliente #${client.id}`;
        option.textContent = label;
        select.appendChild(option);
      });
    } catch (error) {
      console.error('[projeto-novo] Erro ao carregar clientes:', error);
      showToast('Nao foi possivel carregar os clientes.', 'error');
    }
  }

  function somenteNumeros(valor) {
    return String(valor || '').replace(/\D/g, '');
  }

  function limparMoeda(valor) {
    const texto = String(valor || '').trim();
    if (!texto) return null;
    const normalizado = texto
      .replace(/\./g, '')
      .replace(',', '.')
      .replace(/[^\d.-]/g, '');
    const numero = Number(normalizado);
    return Number.isFinite(numero) ? numero : null;
  }

  function obterUrlAtualRelativa() {
    const arquivo = window.location.pathname.split('/').pop() || 'projeto-novo.html';
    return arquivo + window.location.search + window.location.hash;
  }

  function criarUrlVisualizacao(type, id) {
    const returnTo = encodeURIComponent(obterUrlAtualRelativa());
    return `./visualizar.html?type=${encodeURIComponent(type)}&id=${encodeURIComponent(id)}&returnTo=${returnTo}`;
  }

  async function obterOuCriarResponsavel() {
    const nomeCompleto = document.getElementById('fldRespNome').value.trim();
    const cpf = somenteNumeros(document.getElementById('fldRespCpf').value);
    const rgOrgaoEmissor = document.getElementById('fldRespRg').value.trim();
    const profissao = document.getElementById('fldRespProfissao').value.trim();
    const estadoCivil = document.getElementById('fldRespEstadoCivil').value.trim();
    const enderecoResponsavel = document.getElementById('fldRespEndereco').value.trim();
    const email = document.getElementById('fldRespEmail').value.trim();
    const telefone = document.getElementById('fldRespTelefone').value.trim();
    const emailCopia = document.getElementById('fldRespEmailCopia').value.trim();

    const temDadosResponsavel = [
      nomeCompleto,
      cpf,
      rgOrgaoEmissor,
      profissao,
      estadoCivil,
      enderecoResponsavel,
      email,
      telefone,
      emailCopia
    ].some(Boolean);

    if (!temDadosResponsavel) return null;

    const responsaveis = await db.fetchResponsaveis();
    const responsavelExistente = (responsaveis || []).find((resp) => {
      const cpfMatch = cpf && somenteNumeros(resp.cpf) === cpf;
      const emailMatch = email && String(resp.email || '').toLowerCase() === email.toLowerCase();
      return cpfMatch || emailMatch;
    });

    if (responsavelExistente) {
      return responsavelExistente.id;
    }

    if (!nomeCompleto) {
      throw new Error('Informe o nome completo do responsável para cadastrar um novo registro.');
    }

    const payloadResponsavel = {
      nome_completo: nomeCompleto,
      cpf: cpf || null,
      rg_orgao_emissor: rgOrgaoEmissor || null,
      profissao: profissao || null,
      estado_civil: estadoCivil || null,
      endereco_responsavel: enderecoResponsavel || null,
      email: email || null,
      telefone: telefone || null,
      email_copia: emailCopia || null
    };

    const novoResponsavel = await db.insertResponsavel(payloadResponsavel);
    return novoResponsavel.id;
  }

  async function carregarProjetoParaEdicao() {
    if (!projectId) return;

    try {
      const project = await db.fetchProjectById(Number(projectId));
      document.getElementById('fldProjClient').value = project.client_id ? String(project.client_id) : '';
      document.getElementById('fldProjName').value = project.name || '';
      document.getElementById('fldProjServ').value = project.services || '';
      document.getElementById('fldProjStatus').value = project.status || '';

      if (project.responsavel) {
        document.getElementById('fldRespNome').value = project.responsavel.nome_completo || '';
        document.getElementById('fldRespCpf').value = project.responsavel.cpf || '';
        document.getElementById('fldRespRg').value = project.responsavel.rg_orgao_emissor || '';
        document.getElementById('fldRespProfissao').value = project.responsavel.profissao || '';
        document.getElementById('fldRespEstadoCivil').value = project.responsavel.estado_civil || '';
        document.getElementById('fldRespEndereco').value = project.responsavel.endereco_responsavel || '';
        document.getElementById('fldRespEmail').value = project.responsavel.email || '';
        document.getElementById('fldRespTelefone').value = project.responsavel.telefone || '';
        document.getElementById('fldRespEmailCopia').value = project.responsavel.email_copia || '';
      }

      try {
        const contract = await db.fetchContractByProject(Number(projectId));
        if (contract) {
          document.getElementById('fldPaymentMethod').value = contract.payment_method || '';
          document.getElementById('fldInstallmentTerms').value = contract.installment_terms || '';
          document.getElementById('fldInstallmentDueDay').value = contract.installment_due_day || '';
          document.getElementById('fldContractTotal').value = contract.contract_total ?? '';
          document.getElementById('fldInstallmentValue').value = contract.installment_value ?? '';
          document.getElementById('fldContractDeliveryMethod').value = contract.contract_delivery_method || '';
          document.getElementById('fldBillingDeliveryMethod').value = contract.billing_delivery_method || '';
        }
      } catch (error) {
        console.error('[projeto-novo contract]', {
          code: error?.code,
          message: error?.message,
          details: error?.details,
          hint: error?.hint
        });
      }

      try {
        const followup = await db.fetchProjectFollowupByProject(Number(projectId));
        if (followup) {
          document.getElementById('fldProjectFilesRequest').value = followup.project_files_request || '';
          document.getElementById('fldDeliveriesApprovals').value = followup.deliveries_approvals || '';
        }
      } catch (error) {
        console.error('[projeto-novo followup]', {
          code: error?.code,
          message: error?.message,
          details: error?.details,
          hint: error?.hint
        });
      }

      document.querySelector('.page-title').textContent = 'Editar Projeto';
      document.getElementById('btnSaveProj').textContent = 'Salvar Alterações';
    } catch (error) {
      console.error('[projeto-novo] Erro ao carregar projeto para edição:', error);
      showToast('Nao foi possivel carregar o projeto para edicao.', 'error');
    }
  }

  document.getElementById('btnSaveProj').onclick = async function(){
    const clientValue = document.getElementById('fldProjClient').value.trim();
    const clientId = clientValue ? Number(clientValue) : null;
    const name = document.getElementById('fldProjName').value.trim();
    const services = document.getElementById('fldProjServ').value.trim();
    const statusProjeto = document.getElementById('fldProjStatus').value.trim();
    if(!name){
      showToast('Informe o nome do projeto.', 'error');
      document.getElementById('fldProjName').focus();
      return;
    }

    if (projectId && !permissions.podeEditar) {
      showToast('Seu usuario nao possui permissao para editar projetos.', 'error');
      return;
    }

    if (!projectId && !permissions.podeAdicionar) {
      showToast('Seu usuario nao possui permissao para cadastrar projetos.', 'error');
      return;
    }

    try {
      const responsibleId = await obterOuCriarResponsavel();
      const payloadProject = {
        client_id: Number.isFinite(clientId) ? clientId : null,
        name,
        services: services || null,
        status: statusProjeto || null,
        responsible_id: responsibleId || null
      };

      console.log('[btnSaveProj] Salvando projeto no Supabase:', payloadProject);
      const result = projectId
        ? await db.updateProject(Number(projectId), payloadProject)
        : await db.insertProject(payloadProject);

      const projectIdToUse = Number(result?.id || projectId);

      const paymentMethod = document.getElementById('fldPaymentMethod').value.trim();
      const installmentTerms = document.getElementById('fldInstallmentTerms').value.trim();
      const installmentDueDay = document.getElementById('fldInstallmentDueDay').value.trim();
      const contractTotal = limparMoeda(document.getElementById('fldContractTotal').value);
      const installmentValue = limparMoeda(document.getElementById('fldInstallmentValue').value);
      const contractDeliveryMethod = document.getElementById('fldContractDeliveryMethod').value.trim();
      const billingDeliveryMethod = document.getElementById('fldBillingDeliveryMethod').value.trim();

      const contractPayload = {
        payment_method: paymentMethod || null,
        installment_terms: installmentTerms || null,
        installment_due_day: installmentDueDay || null,
        contract_total: contractTotal,
        installment_value: installmentValue,
        contract_delivery_method: contractDeliveryMethod || null,
        billing_delivery_method: billingDeliveryMethod || null
      };

      const possuiDadosContrato = [
        paymentMethod,
        installmentTerms,
        installmentDueDay,
        contractTotal,
        installmentValue,
        contractDeliveryMethod,
        billingDeliveryMethod
      ].some(
        (value) => value !== null && value !== undefined && value !== ''
      );

      let contratoExistente = null;
      try {
        contratoExistente = await db.fetchContractByProject(projectIdToUse);
      } catch (error) {
        console.error('[projeto-novo contract-check]', {
          code: error?.code,
          message: error?.message,
          details: error?.details,
          hint: error?.hint
        });
      }

      if (possuiDadosContrato || (projectId && contratoExistente)) {
        try {
          await db.upsertContractByProject(projectIdToUse, contractPayload);
        } catch (error) {
          console.error('[projeto-novo upsertContractByProject]', {
            code: error?.code,
            message: error?.message,
            details: error?.details,
            hint: error?.hint
          });
        }
      }

      const projectFilesRequest = document.getElementById('fldProjectFilesRequest').value.trim();
      const deliveriesApprovals = document.getElementById('fldDeliveriesApprovals').value.trim();

      const followupPayload = {
        project_files_request: projectFilesRequest || null,
        deliveries_approvals: deliveriesApprovals || null
      };

      const possuiDadosAcompanhamento = [
        projectFilesRequest,
        deliveriesApprovals
      ].some(
        (value) => value !== null && value !== undefined && value !== ''
      );

      let acompanhamentoExistente = null;
      try {
        acompanhamentoExistente = await db.fetchProjectFollowupByProject(projectIdToUse);
      } catch (error) {
        console.error('[projeto-novo followup-check]', {
          code: error?.code,
          message: error?.message,
          details: error?.details,
          hint: error?.hint
        });
      }

      if (possuiDadosAcompanhamento || (projectId && acompanhamentoExistente)) {
        try {
          await db.upsertProjectFollowupByProject(projectIdToUse, followupPayload);
        } catch (error) {
          console.error('[projeto-novo upsertProjectFollowupByProject]', {
            code: error?.code,
            message: error?.message,
            details: error?.details,
            hint: error?.hint
          });
        }
      }

      console.log('[btnSaveProj] Projeto salvo com sucesso:', result);
      showToast(projectId ? 'Projeto atualizado com sucesso.' : 'Projeto cadastrado com sucesso.', 'success');
      const targetId = result?.id || projectIdToUse;
      if (targetId) {
        window.location.href = criarUrlVisualizacao('project', targetId);
      } else {
        window.location.href = './projetos.html';
      }
    } catch (error) {
      console.error('[btnSaveProj] Erro ao salvar projeto:', error);
      showToast('Nao foi possivel salvar o projeto.', 'error');
    }
  };

  await carregarClientes();
  await carregarProjetoParaEdicao();
  </script>
</body>
</html>
