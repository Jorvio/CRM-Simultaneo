<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primeiro acesso - CRM</title><link rel="icon" type="image/png" href="./assets/favicon.png?v=20260722-1">
<link rel="apple-touch-icon" href="./assets/favicon.png?v=20260722-1">
<meta name="theme-color" content="#ffb800"><link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">
  <main class="auth-card" aria-labelledby="firstAccessTitle">
    <img src="./assets/astra-logo.png?v=20260722-1" alt="Astra CRM" class="auth-logo">

    <h1 id="firstAccessTitle" class="auth-title">Crie uma nova senha</h1>
    <p class="auth-subtitle">A senha utilizada era temporária. Defina sua nova senha para continuar.</p>

    <div id="firstAccessMessage" class="auth-error is-hidden" role="alert" aria-live="polite"></div>

    <form id="firstAccessForm" class="auth-form" novalidate>
      <div class="field">
        <label for="firstPassword">Nova senha</label>
        <div class="input-wrap">
          <input id="firstPassword" type="password" autocomplete="new-password" required>
          <button id="toggleFirstPassword" type="button" class="toggle-pass">Mostrar</button>
        </div>
      </div>

      <div class="field">
        <label for="firstPasswordConfirm">Confirmar nova senha</label>
        <div class="input-wrap">
          <input id="firstPasswordConfirm" type="password" autocomplete="new-password" required>
          <button id="toggleFirstPasswordConfirm" type="button" class="toggle-pass">Mostrar</button>
        </div>
      </div>

      <button id="btnFirstAccess" type="submit" class="btn-primary btn-block">Salvar nova senha</button>
    </form>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
