<!DOCTYPE html>

</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="sidebar-brand"><div class="brand-icon">CRM</div><div class="brand-text"><span>CRM</span><small>Simultâneo</small></div></div>
      <nav class="sidebar-nav">

        <a class="nav-item" href="#"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.2a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.2a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9c0 .7.4 1.3 1 1.5V11a2 2 0 0 1 0 4h-.2a1.7 1.7 0 0 0-1.5 1Z"></path></svg></span><span class="nav-label">Configurações</span></a>
      </nav>
      <div class="sidebar-footer"><div class="profile-avatar">J</div><div class="profile-info"><span class="profile-name">João</span><span class="profile-role">Gestor</span></div></div>
    </aside>
    <main class="page-content">
      <div class="app">
        <div class="page-card">
          <div class="page-header"><div><h1 class="page-title">Cadastrar Projeto</h1><div class="page-subtext">Inclua dados do responsável, financeiro e contrato</div></div></div>
          <div class="page-body">
            <div class="form-grid" style="grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
              <div class="field"><label>Nome do Projeto</label><input id="fldProjName" type="text" placeholder="Nome do projeto"></div>
              <div class="field"><label>Nº da Proposta</label><input id="fldProjPropNum" type="text" placeholder="Nº da proposta"></div>
              <div class="field" style="grid-column:1 / -1"><label>Serviços</label><input id="fldProjServ" type="text" placeholder="Serviços incluídos"></div>
            </div>
            <div class="card-grid">
              <div class="page-card" style="padding:20px;">
                <div class="page-header" style="padding:0 0 20px 0; border-bottom:1px solid var(--border); margin-bottom:20px;">
                  <h2 class="page-title" style="font-size:18px; margin:0;">Responsável</h2>
                </div>
                <div class="form-grid" style="grid-template-columns:1fr; gap:16px;">
                  <div class="field"><label>Nome Completo</label><input type="text" placeholder="Nome completo"></div>
                  <div class="field"><label>CPF</label><input type="text" placeholder="000.000.000-00"></div>
                  <div class="field"><label>RG - Órgão Emissor</label><input type="text" placeholder="RG e órgão emissor"></div>
                  <div class="field"><label>Profissão</label><input type="text" placeholder="Profissão"></div>
                  <div class="field"><label>Estado Civil</label><input type="text" placeholder="Estado civil"></div>
                  <div class="field"><label>Endereço Completo Responsável</label><textarea placeholder="Rua, número, bairro, cidade, estado, CEP"></textarea></div>
                  <div class="field"><label>E-mail</label><input type="email" placeholder="email@empresa.com"></div>
                  <div class="field"><label>Telefone</label><input type="text" placeholder="(47) 99999-9999"></div>
                  <div class="field"><label>E-mail em cópia</label><input type="email" placeholder="email.copia@empresa.com"></div>
                </div>
              </div>
              <div class="page-card" style="padding:20px;">
                <div class="page-header" style="padding:0 0 20px 0; border-bottom:1px solid var(--border); margin-bottom:20px;">
                  <h2 class="page-title" style="font-size:18px; margin:0;">Financeiro</h2>
                </div>
                <div class="form-grid" style="grid-template-columns:1fr; gap:16px;">
                  <div class="field"><label>Forma de pagamento</label><input type="text" placeholder="Ex: Boleto, Cartão, Transferência"></div>
                  <div class="field"><label>Forma de parcelamento</label><input type="text" placeholder="Ex: 3x, 6x, 12x"></div>
                  <div class="field"><label>Dia de vencimento das parcelas</label><input type="text" placeholder="Dia do mês"></div>
                  <div class="field"><label>Valor total do contrato</label><input type="text" placeholder="R$ 0,00"></div>
                  <div class="field"><label>Valor das parcelas</label><input type="text" placeholder="R$ 0,00"></div>
                </div>
              </div>
              <div class="page-card" style="padding:20px;">
                <div class="page-header" style="padding:0 0 20px 0; border-bottom:1px solid var(--border); margin-bottom:20px;">
                  <h2 class="page-title" style="font-size:18px; margin:0;">Contrato</h2>
                </div>
                <div class="form-grid" style="grid-template-columns:1fr; gap:16px;">
                  <div class="field"><label>Envio do contrato</label><input type="text" placeholder="Ex: Por e-mail, correio, assinatura digital"></div>
                  <div class="field"><label>Envio de cobranças</label><input type="text" placeholder="Ex: Mensal, quinzenal"></div>
                </div>
              </div>
              <div class="page-card" style="padding:20px;">
                <div class="page-header" style="padding:0 0 20px 0; border-bottom:1px solid var(--border); margin-bottom:20px;">
                  <h2 class="page-title" style="font-size:18px; margin:0;">Acompanhamento do Projeto</h2>
                </div>
                <div class="form-grid" style="grid-template-columns:1fr; gap:16px;">
                  <div class="field"><label>Solicitação de arquivos de projeto</label><input type="text" placeholder="Ex: Modelos, plantas, texturas"></div>
                  <div class="field"><label>Entregas e aprovações</label><textarea placeholder="Fases de entrega e aprovação"></textarea></div>
                </div>
              </div>
            </div>
            <div class="actions"><button class="btn-primary" id="btnSaveProj">Salvar Projeto</button><button class="btn-secondary" onclick="history.back()">Cancelar</button></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script type="module">
  import { db, dbMessage } from './supabase.js';

  document.getElementById('btnSaveProj').onclick = async function(){
    const name = document.getElementById('fldProjName').value.trim();
    const serv = document.getElementById('fldProjServ').value.trim();
    const propNum = document.getElementById('fldProjPropNum').value.trim();
    if(!name){ alert('Nome do projeto é obrigatório'); return; }

    const payload = { name, services: serv || null, proposal_number: propNum || null };
    console.log('[btnSaveProj] Salvando projeto no Supabase:', payload);
    try {
      const result = await db.insertProject(payload);
      console.log('[btnSaveProj] Projeto inserido com sucesso:', result);
      alert('Projeto cadastrado com sucesso!');
      history.back();
    } catch (error) {
      console.error('[btnSaveProj] Erro ao salvar projeto:', error);
      alert(`Erro ao salvar projeto:\n${error.message || JSON.stringify(error)}`);
    }
  };
  </script>
</body>
</html>
